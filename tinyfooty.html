<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#050508">
<title>Tiny Footy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap"></noscript>
<style>
html,body{width:100%;height:100%;overflow:hidden;background:#050508;display:flex;align-items:center;justify-content:center;margin:0;padding:0;}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cyan:   #00e5ff;
    --purple: #b44fff;
    --pink:   #ff2d78;
    --dark:   #050508;
    --tile:   #0a0a12;
    --tile2:  #0d0d18;
  }

  {
    background: #050508;
    background-image: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(0,229,255,0.06) 0%, transparent 70%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: unset;
    font-family: 'Nunito', sans-serif;
    overflow: hidden; user-select: none; -webkit-user-select: none;
  }

  #game-wrapper { display: flex; flex-direction: column; align-items: center; gap: 10px; }


  /* HUD */
  #hud {
    display: flex; justify-content: space-between; align-items: center;
    width: 100%; max-width: 340px; padding: 0 6px;
  }

  .hud-item { display: flex; flex-direction: column; align-items: center; }

  .hud-label {
    font-size: 10px; font-weight: 800; letter-spacing: 3px; text-transform: uppercase;
    color: rgba(0,229,255,0.45);
  }

  .hud-value {
    font-size: 38px; font-weight: 900; line-height: 1;
    color: #fff;
    text-shadow: 0 0 16px var(--cyan), 0 0 40px rgba(0,229,255,0.3);
  }

  #game-title {
    font-size: 13px; font-weight: 900; letter-spacing: 5px; text-transform: uppercase;
    color: rgba(255,255,255,0.7);
  }


  /* Field */
  #field-container {
    position: relative; overflow: hidden; touch-action: none;
    border: 1px solid rgba(0,229,255,0.18);
    box-shadow:
      0 0 0 1px rgba(0,229,255,0.08),
      0 0 40px rgba(0,229,255,0.12),
      0 0 80px rgba(0,0,0,0.9),
      inset 0 0 30px rgba(0,0,20,0.6);
    border-radius: 3px;
  }

  #field-canvas { display: block; margin: 0 auto; }
#field-container { position: relative; display: inline-block; }


  /* Hint */
  #hint {
    font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
    color: rgba(255,255,255,0.2); text-align: center;
  }


  /* Overlays */
  .overlay {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(0,0,4,0.88); backdrop-filter: blur(8px);
    z-index: 10; gap: 10px; opacity: 0; pointer-events: none; transition: opacity 0.25s ease;
  }

  .overlay.show { opacity: 1; pointer-events: all; }


  .overlay-title {
    font-size: 20px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase;
    color: #fff; text-shadow: 0 0 30px var(--cyan), 0 0 60px rgba(0,229,255,0.4);
    line-height: 1.2; text-align: center;
  }

  .overlay-sub {
    font-size: 13px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
    color: rgba(255,255,255,0.45);
  }


  /* Neon pill buttons */
  .btn {
    margin-top: 10px; padding: 14px 40px;
    background: transparent;
    border: 2px solid var(--cyan);
    border-radius: 40px;
    color: var(--cyan);
    font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 900;
    letter-spacing: 3px; text-transform: uppercase; cursor: pointer;
    box-shadow: 0 0 20px rgba(0,229,255,0.35), inset 0 0 16px rgba(0,229,255,0.08);
    transition: box-shadow 0.15s, transform 0.1s;
  }

  .btn:hover {
    box-shadow: 0 0 30px rgba(0,229,255,0.6), inset 0 0 20px rgba(0,229,255,0.18);
  }

  .btn:active { transform: scale(0.96); }

  .btn-red {
    border-color: var(--pink); color: var(--pink);
    box-shadow: 0 0 20px rgba(255,45,120,0.35), inset 0 0 16px rgba(255,45,120,0.08);
  }

  #game-btns {
    display: flex; flex-direction: row; justify-content: center; align-items: center;
    gap: 16px; width: 100%; max-width: 340px; padding: 2px 0 8px;
  }

  .btn-restart {
    margin-top: 0; padding: 10px 18px;
    border: 1.5px solid rgba(0,229,255,0.2);
    border-radius: 13px;
    background: rgba(0,229,255,0.04);
    color: rgba(0,229,255,0.45);
    font-size: 24px; letter-spacing: 0;
    box-shadow: none;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
  }

  .btn-restart:hover {
    border-color: rgba(0,229,255,0.5);
    color: rgba(0,229,255,0.85);
    background: rgba(0,229,255,0.08);
    box-shadow: 0 0 10px rgba(0,229,255,0.15);
  }

  #hint-toast {
    background:rgba(0,0,0,0.82); border:1px solid rgba(255,180,0,0.5);
    color:rgba(255,200,0,0.9); font-family:'Nunito',sans-serif; font-size:12px;
    font-weight:700; padding:8px 18px; border-radius:20px; text-align:center;
    white-space:normal; pointer-events:none; text-align:center;
    opacity:0; transition:opacity 0.3s;
    max-width:300px;
  }

  #hint-toast.show { opacity:1; }


  /* ── Homepage animations ─────────────────────────────────────────────── */
  @keyframes orb-float1 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(18px,-22px) scale(1.1)} }

  @keyframes orb-float2 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(-14px,20px) scale(0.9)} }
  @keyframes orb-float3 { 0%,100%{transform:translate(0,0) scale(1.05)} 50%{transform:translate(10px,14px) scale(0.95)} }
  /* ball-spin and ball-float removed — handled by JS */
  @keyframes title-glow { 0%,100%{text-shadow:0 0 30px var(--cyan),0 0 60px rgba(0,229,255,0.4)} 50%{text-shadow:0 0 50px var(--cyan),0 0 100px rgba(0,229,255,0.7),0 0 4px #fff} }
  @keyframes btn-pulse  { 0%,100%{box-shadow:0 0 20px rgba(0,229,255,0.35),inset 0 0 16px rgba(0,229,255,0.08)} 50%{box-shadow:0 0 40px rgba(0,229,255,0.7),inset 0 0 24px rgba(0,229,255,0.18)} }
  @keyframes scanlines  { from{background-position:0 0} to{background-position:0 100px} }
  @keyframes divider-glow { 0%,100%{opacity:0.3} 50%{opacity:0.9} }

  .home-orbs { position:absolute; inset:0; pointer-events:none; overflow:hidden; }

  .orb {
    position:absolute; border-radius:50%; filter:blur(48px);
  }

  .orb1 { width:180px; height:180px; background:rgba(0,229,255,0.18); top:-40px; left:-40px; animation:orb-float1 6s ease-in-out infinite; }

  .orb2 { width:140px; height:140px; background:rgba(180,60,255,0.18); bottom:-20px; right:-20px; animation:orb-float2 7s ease-in-out infinite; }

  .orb3 { width:100px; height:100px; background:rgba(255,45,120,0.14); bottom:30px; left:20%; animation:orb-float3 5s ease-in-out infinite; }


  .home-ball-wrap {
    position:relative; z-index:1;
    display:flex; flex-direction:column; align-items:center;
  }

  .home-ball { font-size:44px; display:block; transform-origin:center; animation:none!important; }

  .home-shadow {
    width:36px; height:10px; border-radius:50%;
    background:rgba(0,0,0,0.6);
    filter:blur(5px);
    transform-origin:center;
    margin-top:4px;
  }


  .home-title {
    position:relative; z-index:1;
    animation:title-glow 3s ease-in-out infinite;
    margin-top:6px;
  }


  .home-tagline {
    font-family:'Nunito',sans-serif; font-size:12px; font-weight:700;
    letter-spacing:3px; text-transform:uppercase;
    color:rgba(0,229,255,0.5);
    position:relative; z-index:1;
    margin-top:4px;
  }


  .home-divider {
    width:60px; height:2px; border-radius:2px;
    background:linear-gradient(90deg, transparent, var(--cyan), transparent);
    margin:12px auto 4px;
    animation:divider-glow 2s ease-in-out infinite;
    position:relative; z-index:1;
  }


  .home-btn {
    position:relative; z-index:1;
    animation:btn-pulse 2.5s ease-in-out infinite;
  }


body{max-width:680px;margin:0.25rem auto 2rem;border-radius:16px;overflow:hidden;border:1px solid rgba(0,229,255,0.2);box-shadow:0 0 40px rgba(0,0,0,0.2);background:#050508;height:fit-content;display:block;padding-top:20px;}
/* Override game body styles that leak out */
#game-wrapper{min-height:unset!important;height:auto!important;overflow:hidden!important;padding:16px 12px 16px!important;display:flex!important;flex-direction:column!important;align-items:center!important;}
body{background:#050508;display:flex;flex-direction:column;align-items:stretch;}
/* Ensure canvas fills width responsively */
.game-outer-wrap{}
@media(max-width:600px){
  .game-outer-wrap{margin:0!important;padding:0!important;max-width:100vw!important;width:100%!important;overflow:hidden!important;}
  body{margin:0!important;border-radius:0!important;border-left:none!important;border-right:none!important;width:100vw!important;position:relative!important;left:50%!important;transform:translateX(-50%)!important;padding-top:0!important;}
  #game-wrapper{padding:8px 0 8px!important;}
  #hud{max-width:100%!important;padding:0 12px!important;}
  #game-btns{max-width:100%!important;padding:4px 0 10px!important;}
  #field-container{width:100%!important;}
  #field-canvas{width:100%!important;display:block!important;}
}
/* Fullscreen override */
body{margin:0!important;border-radius:0!important;border:none!important;width:100vw!important;height:100vh!important;max-width:none!important;overflow:hidden;padding-top:env(safe-area-inset-top,0px)!important;padding-bottom:env(safe-area-inset-bottom,0px)!important;box-sizing:border-box!important;}
#game-wrapper{height:calc(100vh - env(safe-area-inset-top,0px) - env(safe-area-inset-bottom,0px))!important;display:flex!important;flex-direction:column!important;align-items:center!important;justify-content:center!important;}
</style>

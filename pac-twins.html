<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TWO PACS</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  background: #050508;
  font-family: 'Nunito', sans-serif;
  overflow: hidden;
  user-select: none; -webkit-user-select: none;
  touch-action: none;
}

#app {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 100dvh;
  gap: 10px;
  background: radial-gradient(ellipse 80% 55% at 50% 0%,rgba(0,229,255,.06) 0%,transparent 65%);
  padding: 10px 8px;
}

/* ── HUD ───────────────────────────────────────────── */
#hud {
  display: flex; justify-content: space-between; align-items: center;
  width: 100%; max-width: 330px; padding: 0 8px;
}
.hud-block { display: flex; flex-direction: column; align-items: center; }
.hud-label { font-size: 9px; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; color: rgba(0,229,255,.4); }
.hud-val   { font-size: 34px; font-weight: 900; line-height: 1; color: #fff;
             text-shadow: 0 0 14px #00e5ff, 0 0 36px rgba(0,229,255,.2); }
#game-title { font-size: 13px; font-weight: 900; letter-spacing: 5px; text-transform: uppercase;
              color: rgba(255,255,255,.5); text-align: center; }
#cherry-bar { display: flex; gap: 5px; justify-content: center; margin-top: 3px; flex-wrap: wrap; max-width: 120px; }
.c-dot { width: 9px; height: 9px; border-radius: 50%;
         background: #ff2255; box-shadow: 0 0 6px rgba(255,34,85,.7);
         transition: all .2s; }
.c-dot.eaten { background: rgba(255,34,85,.12); box-shadow: none; }

/* ── Canvas container ─────────────────────────────── */
#field-wrap {
  position: relative;
  border: 1px solid rgba(0,229,255,.15);
  box-shadow: 0 0 40px rgba(0,229,255,.08), 0 0 80px rgba(0,0,0,.95),
              inset 0 0 30px rgba(0,0,20,.5);
  border-radius: 4px; overflow: hidden;
  touch-action: none;
}
canvas { display: block; }

/* ── Overlays ─────────────────────────────────────── */
.overlay {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: rgba(0,0,6,.88); backdrop-filter: blur(8px);
  gap: 12px; z-index: 20;
  opacity: 0; pointer-events: none;
  transition: opacity .25s ease;
}
.overlay.show { opacity: 1; pointer-events: all; }
.ov-title {
  font-size: 40px; font-weight: 900; letter-spacing: 3px;
  text-transform: uppercase; color: #fff; line-height: 1;
  text-shadow: 0 0 28px #00e5ff, 0 0 56px rgba(0,229,255,.4);
}
.ov-sub { font-size: 11px; font-weight: 700; letter-spacing: 2px;
          text-transform: uppercase; color: rgba(255,255,255,.4); text-align: center; }

/* ── Buttons ──────────────────────────────────────── */
.btn {
  padding: 11px 30px;
  background: transparent;
  border: 2px solid #00e5ff; border-radius: 40px;
  color: #00e5ff; font-family: 'Nunito', sans-serif;
  font-size: 13px; font-weight: 900; letter-spacing: 3px;
  text-transform: uppercase; cursor: pointer;
  box-shadow: 0 0 18px rgba(0,229,255,.3), inset 0 0 14px rgba(0,229,255,.06);
  transition: box-shadow .15s, transform .1s;
}
.btn:hover { box-shadow: 0 0 28px rgba(0,229,255,.6), inset 0 0 18px rgba(0,229,255,.14); }
.btn:active { transform: scale(.96); }
.btn-pink { border-color: #ff4466; color: #ff4466;
  box-shadow: 0 0 18px rgba(255,68,102,.3), inset 0 0 14px rgba(255,68,102,.06); }
.btn-pink:hover { box-shadow: 0 0 28px rgba(255,68,102,.6), inset 0 0 18px rgba(255,68,102,.14); }

/* ── Controls ─────────────────────────────────────── */
#controls { display: flex; flex-direction: column; align-items: center; gap: 6px; }

#d-pad {
  display: grid;
  grid-template-columns: 52px 52px 52px;
  grid-template-rows: 52px 52px;
  gap: 4px;
}
.d-btn {
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,229,255,.05);
  border: 1.5px solid rgba(0,229,255,.18);
  border-radius: 12px;
  color: rgba(0,229,255,.65);
  font-size: 20px; cursor: pointer;
  transition: all .1s;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.d-btn:active {
  background: rgba(0,229,255,.18);
  border-color: rgba(0,229,255,.6);
  color: #00e5ff;
  transform: scale(.9);
}
#action-row { display: flex; gap: 8px; }
.a-btn {
  padding: 7px 18px;
  background: rgba(0,229,255,.04);
  border: 1.5px solid rgba(0,229,255,.18);
  border-radius: 30px;
  color: rgba(0,229,255,.5);
  font-family: 'Nunito', sans-serif;
  font-size: 11px; font-weight: 800; letter-spacing: 2px;
  text-transform: uppercase; cursor: pointer;
  transition: all .15s;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.a-btn:active {
  background: rgba(0,229,255,.14);
  border-color: rgba(0,229,255,.5);
  color: rgba(0,229,255,.9);
  transform: scale(.95);
}

@media (max-width: 380px) {
  #hud, .d-btn { font-size: 18px; }
  .d-btn { width: 46px; height: 46px; }
}

/* ── Hint arrow ────────────────────────────────────────────────── */
#hint-arrow {
  position: absolute; inset: 0; pointer-events: none; z-index: 15;
}
.a-btn.active {
  background: rgba(0,229,255,.22);
  border-color: rgba(0,229,255,.7);
  color: rgba(0,229,255,1);
  box-shadow: 0 0 14px rgba(0,229,255,.5);
}
</style>
</head>
<body>
<div id="app">
  <div id="hud">
    <div class="hud-block">
      <span class="hud-label">Score</span>
      <span class="hud-val" id="score-disp">0</span>
    </div>
    <div style="text-align:center">
      <div id="game-title">TWO PACS</div>
      <div id="cherry-bar"></div>
    </div>
    <div class="hud-block">
      <span class="hud-label">Level</span>
      <span class="hud-val" id="level-disp">1</span>
    </div>
  </div>

  <div id="field-wrap">
    <canvas id="canvas"></canvas>
    <canvas id="cc" style="position:absolute;inset:0;pointer-events:none;z-index:10;"></canvas>
    <canvas id="hint-arrow" style="position:absolute;inset:0;pointer-events:none;z-index:15;"></canvas>

    <!-- Start overlay -->
    <div class="overlay show" id="ov-start">
      <div style="font-size:36px">🟡🟡</div>
      <div class="ov-title">TWO PACS</div>
      <div class="ov-sub">Guide BOTH pacs · Eat all cherries<br>Avoid the ghosts!</div>
      <button class="btn" onclick="startGame()">PLAY</button>
    </div>

    <!-- Win overlay -->
    <div class="overlay" id="ov-win">
      <div style="font-size:36px">🍒</div>
      <div class="ov-title">CLEARED!</div>
      <div class="ov-sub" id="win-sub">Level 1 complete</div>
      <button class="btn" onclick="nextLevel()">NEXT →</button>
    </div>

    <!-- All levels done -->
    <div class="overlay" id="ov-done">
      <div style="font-size:36px">🏆</div>
      <div class="ov-title" style="font-size:28px">ALL LEVELS<br>CLEARED!</div>
      <div class="ov-sub" id="done-score"></div>
      <button class="btn" onclick="restartAll()">PLAY AGAIN</button>
    </div>

    <!-- Dead overlay -->
    <div class="overlay" id="ov-dead">
      <div style="font-size:36px">👻</div>
      <div class="ov-title" style="color:#ff4466;text-shadow:0 0 28px #ff4466">GOT YOU!</div>
      <div class="ov-sub">A ghost caught a pac</div>
      <button class="btn btn-pink" onclick="retryLevel()">RETRY</button>
    </div>
  </div>

  <div id="controls">
    <div id="d-pad">
      <div></div>
      <button class="d-btn" id="btn-up"    onpointerdown="inp('up')">▲</button>
      <div></div>
      <button class="d-btn" id="btn-left"  onpointerdown="inp('left')">◀</button>
      <button class="d-btn" id="btn-down"  onpointerdown="inp('down')">▼</button>
      <button class="d-btn" id="btn-right" onpointerdown="inp('right')">▶</button>
    </div>
    <div id="action-row">
      <button class="a-btn" onclick="undoMove()">↩ UNDO</button>
      <button class="a-btn" onclick="retryLevel()">↺ RESTART</button>
      <button class="a-btn" id="btn-hint" onclick="showHint()">💡 HINT</button>
      <button class="a-btn" id="btn-solve" onclick="toggleSolve()">▶ SOLVE</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
//  PAC TWINS
//
//  CONFIG FORMAT:
//  Line 1:  COLS ROWS
//  Grid:    G=cherry  S=pac  #=block  .=empty
//  W/T lines (ghosts): W row col  row col  row col ...
//    → ghost starts at first (row,col), ping-pongs through waypoints
//    W = ghost type 1 (red)   T = ghost type 2 (blue)
//
//  RULES:
//  - Both pacs move in tandem (same direction)
//  - Each pac blocked independently by walls & blocks
//  CONFIG FORMAT:
//  Line 1:  COLS ROWS
//  Grid:    G=cherry  S=pac  #=block  .=empty
//  W/T lines (ghosts): W/T row col  row col  ...  (ping-pong patrol)
//    W = blue ghost  (follows path only)
//    T = RED ghost   (follows path BUT if a pac is in line-of-sight
//                     it abandons patrol and steps straight toward it)
//
//  RULES:
//  - Both pacs move in tandem (same direction)
//  - Each pac blocked independently by walls & blocks
//  - Turn: pacs move → eat cherries → check death → ghosts move → check death
//  - Win: all cherries eaten
// ═══════════════════════════════════════════════════════════════════

const LEVELS = [
// ─ m000 ──────────────────────────────────────────────────────────────
` 5 5 50
. . . . .
. . G . .
. . . # .
. # . S .
G S . . .
W 0 2 0 3 0 4 1 4 0 4 0 3
T 1 1 1 0 2 0 1 0`,

// ─ m001 ──────────────────────────────────────────────────────────────
`5 5 50
. . . G .
. . # . .
S # G . .
. . S . .
. . . . .
W 0 2 0 1 0 0 1 0 0 0 0 1
W 0 4 1 4 1 3 1 4`,

// ─ m002 ──────────────────────────────────────────────────────────────
`5 5 50
. . . . .
. . . . .
G S . . S
. . . . .
. G . # .
W 4 2 3 2
W 4 0 3 0 3 1 3 0`,

// ─ m003 ──────────────────────────────────────────────────────────────
`5 5 50
S # . . .
. . . . .
# . G . G
. . . . .
. . S . .
W 3 4 4 4
W 3 2 3 1 3 0 3 1`,

// ─ m004 ──────────────────────────────────────────────────────────────
`5 5 50
. . . . .
. . . . .
. . . . S
. . . S G
. G # . .
W 4 4 4 3
T 4 0 3 0`,

// ─ m005 ──────────────────────────────────────────────────────────────
`5 5 50
G . . # .
. . G # .
. . S . .
. . . . .
. . S . .
W 0 1 1 1 1 0 2 0 1 0 1 1
W 1 4 2 4 3 4 2 4`,
];

const SOLUTIONS = [
  ['down','up','left','up','up'],         // m000
  ['up','left','right','up','up'],         // m001
  ['left','left','right','down','down'],   // m002
  ['down','up','up','right','right'],      // m003
  ['right','left','left','left','down'],   // m004
  ['up','up','right','left','left'],       // m005
];

// Hint / solve state
let hintStep = 0;       // next solution step to show
let solveTimer = null;  // auto-solve interval handle
let _ac;
function getAC() {
  if (!_ac || _ac.state === 'closed') _ac = new (window.AudioContext || window.webkitAudioContext)();
  if (_ac.state === 'suspended') _ac.resume();
  return _ac;
}
function playTone(freq1, freq2, type, dur, vol) {
  try {
    const ac = getAC(); const t = ac.currentTime;
    const o = ac.createOscillator(); const g = ac.createGain();
    o.type = type || 'sine';
    o.frequency.setValueAtTime(freq1, t);
    if (freq2) o.frequency.exponentialRampToValueAtTime(freq2, t + dur);
    g.gain.setValueAtTime(vol || 0.3, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.connect(g); g.connect(ac.destination);
    o.start(t); o.stop(t + dur);
  } catch(e) {}
}
function playEat()  { playTone(880, 1400, 'square', 0.09, 0.18); }
function playDead() { playTone(440, 60, 'sawtooth', 0.5, 0.35); }
function playWin()  {
  [0,1,2,3].forEach(i => setTimeout(() =>
    playTone(440 * Math.pow(1.25, i), 440 * Math.pow(1.25, i) * 1.5, 'sine', 0.18, 0.25), i * 120));
}

// ── Parse level ────────────────────────────────────────────────────
function parseLevel(txt) {
  const lines = txt.trim().split('\n').map(l => l.trim());
  const [cols, rows] = lines[0].split(/\s+/).filter(Boolean).map(Number);
  const pacs = [], cherries = [], blocks = [], ghosts = [];

  for (let r = 0; r < rows; r++) {
    const toks = (lines[r + 1] || '').split(/\s+/);
    for (let c = 0; c < Math.min(toks.length, cols); c++) {
      const s = toks[c];
      if (s === 'S') pacs.push({ x: c, y: r });
      else if (s === 'G') cherries.push({ x: c, y: r });
      else if (s === '#') blocks.push({ x: c, y: r });
    }
  }

  // Ghost lines — W/T  row col  row col ...  (row,col format)
  for (let i = rows + 1; i < lines.length; i++) {
    const parts = lines[i].split(/\s+/);
    if (!parts[0].match(/^[WT]$/i)) continue;
    const type = parts[0].toUpperCase();
    const path = [];
    for (let j = 1; j + 1 < parts.length; j += 2) {
      path.push({ x: parseInt(parts[j + 1]), y: parseInt(parts[j]) }); // swap: row→y, col→x
    }
    if (path.length >= 1) {
      ghosts.push({ type, path, pathIdx: 0, forward: true, x: path[0].x, y: path[0].y });
    }
  }

  return { cols, rows, pacs, cherries, blocks, ghosts };
}

// ── State ─────────────────────────────────────────────────────────
let gs = null;
let undoStack = [];
let score = 0;
let levelIdx = 0;
let totalCherries = 0;

// Animation
let animating = false;
let animT = 0;
let animStart = 0;
const ANIM_MS = 230;
let pendingDir = null;

function loadLevel(idx) {
  const d = parseLevel(LEVELS[idx]);
  gs = {
    cols: d.cols, rows: d.rows,
    pacs: d.pacs.map((p, i) => ({
      x: p.x, y: p.y, px: p.x, py: p.y,
      facing: 'right', id: i
    })),
    ghosts: d.ghosts.map(g => ({
      ...g, px: g.x, py: g.y, pathIdx: 0, forward: true,
      x: g.path[0].x, y: g.path[0].y
    })),
    cherries: d.cherries.map(c => ({ ...c })),
    blocks: d.blocks,
    dead: false, won: false,
    pendingEat: [],
  };
  totalCherries = gs.cherries.length;
  undoStack = [];
  animating = false;
  deathAnimating = false;
  deathPacs = [];
  pendingDir = null;
  isUndoAnim = false;
  undoRestoreCherries = [];
  hintStep = 0;
  clearHintArrow();
  setupCanvas();
  updateCherryBar();
  updateHUD();
}

function snapshot() {
  return {
    pacs: gs.pacs.map(p => ({ ...p })),
    ghosts: gs.ghosts.map(g => ({ ...g, path: g.path, chasing: g.chasing, chaseDir: g.chaseDir })),
    cherries: gs.cherries.map(c => ({ ...c })),
  };
}
function restoreSnap(snap) {
  gs.pacs    = snap.pacs.map(p => ({ ...p }));
  gs.ghosts  = snap.ghosts.map(g => ({ ...g, path: g.path }));
  gs.cherries = snap.cherries.map(c => ({ ...c }));
  gs.dead = false; gs.won = false;
  gs.pendingEat = [];
  updateCherryBar();
}

// ── Game logic ─────────────────────────────────────────────────────
const DX = { right: 1, left: -1, up: 0, down: 0 };
const DY = { right: 0, left: 0, up: -1, down: 1 };

function blocked(x, y) {
  if (x < 0 || x >= gs.cols || y < 0 || y >= gs.rows) return true;
  return gs.blocks.some(b => b.x === x && b.y === y);
}
function otherPacAt(x, y, excludeId) {
  return gs.pacs.some(p => p.id !== excludeId && p.x === x && p.y === y);
}
function ghostAt(x, y) {
  return gs.ghosts.some(g => g.x === x && g.y === y);
}

// Returns true if all cherries will be eaten this turn (pendingEat covers all remaining)
function allCherriesEaten() {
  return gs.cherries.every(c => gs.pendingEat.some(e => e.x === c.x && e.y === c.y));
}

function processTurn(dir) {
  if (gs.dead || gs.won || animating) {
    if (animating) pendingDir = dir;
    return;
  }

  undoStack.push(snapshot());
  if (undoStack.length > 30) undoStack.shift();

  // Save previous positions for interpolation
  gs.pacs.forEach(p => { p.px = p.x; p.py = p.y; p.facing = dir; });
  gs.ghosts.forEach(g => { g.px = g.x; g.py = g.y; });

  const dx = DX[dir], dy = DY[dir];

  // Move pacs — stage cherries into pendingEat, don't remove yet
  gs.pendingEat = [];
  gs.pacs.forEach(pac => {
    const nx = pac.x + dx, ny = pac.y + dy;
    if (!blocked(nx, ny) && !otherPacAt(nx, ny, pac.id)) {
      pac.x = nx; pac.y = ny;
    }
    const ci = gs.cherries.findIndex(c => c.x === pac.x && c.y === pac.y);
    if (ci !== -1 && !gs.pendingEat.some(e => e.x === pac.x && e.y === pac.y)) {
      gs.pendingEat.push({ x: pac.x, y: pac.y, eaten: false });
    }
  });

  // Check death after pacs move — but win takes priority if last cherry eaten
  if (gs.pacs.some(p => ghostAt(p.x, p.y))) {
    if (allCherriesEaten()) { gs.won = true; startAnim(); return; }
    gs.dead = true; startAnim(); return;
  }

  // T ghost instant kill — win takes priority if last cherry eaten
  for (const g of gs.ghosts) {
    if (g.type !== 'T') continue;
    const target = ghostLOS(g);
    if (target) {
      g.chasing = true;
      g.chaseDir = { dx: target.dx, dy: target.dy };
      g.x = target.pac.x;
      g.y = target.pac.y;
      if (allCherriesEaten()) { gs.won = true; startAnim(); return; }
      gs.dead = true; playDead(); startAnim(); return;
    }
  }

  // Move all ghosts
  gs.ghosts.forEach(moveGhost);

  // Check death after ghosts move — win takes priority if last cherry eaten
  if (gs.pacs.some(p => ghostAt(p.x, p.y))) {
    if (allCherriesEaten()) { gs.won = true; startAnim(); return; }
    gs.dead = true; playDead(); startAnim(); return;
  }

  updateHUD();
  startAnim();
}

// Called at end of animation — commit any pending cherry eats
function commitPendingEats() {
  if (!gs.pendingEat || gs.pendingEat.length === 0) return;
  gs.pendingEat.forEach(e => {
    const ci = gs.cherries.findIndex(c => c.x === e.x && c.y === e.y);
    if (ci !== -1) {
      gs.cherries.splice(ci, 1);
      score += 10;
    }
  });
  if (gs.pendingEat.length > 0) {
    updateCherryBar();
    updateHUD();
  }
  gs.pendingEat = [];
  // Check win now that cherries are truly removed
  if (gs.cherries.length === 0 && !gs.dead) {
    gs.won = true;
  }
}

// Get the direction the T ghost is currently traveling along its patrol path.
// Always derived from path array positions so it stays correct even after a chase-jump.
function ghostFacingDir(g) {
  if (g.path.length <= 1) return null;
  const curr = g.path[g.pathIdx];
  const nextIdx = (g.pathIdx + 1) % g.path.length;
  const next = g.path[nextIdx];
  const dx = Math.sign(next.x - curr.x);
  const dy = Math.sign(next.y - curr.y);
  if (dx === 0 && dy === 0) return null;
  return { dx, dy };
}

// Returns target pac ONLY if it's directly ahead (in ghost's travel direction)
// with no blocks between. Scans from the ghost's ACTUAL position.
function ghostLOS(g) {
  if (g.type !== 'T') return null;
  const dir = ghostFacingDir(g);
  if (!dir) return null;
  let cx = g.x + dir.dx, cy = g.y + dir.dy;
  while (cx >= 0 && cx < gs.cols && cy >= 0 && cy < gs.rows) {
    if (gs.blocks.some(b => b.x === cx && b.y === cy)) break;
    const pac = gs.pacs.find(p => p.x === cx && p.y === cy);
    if (pac) return { pac, dx: dir.dx, dy: dir.dy };
    cx += dir.dx; cy += dir.dy;
  }
  return null;
}

function moveGhost(g) {
  g.chasing = false;
  g.chaseDir = null;
  // Cyclic path: step to next waypoint, wrap back to 0 after last
  if (g.path.length <= 1) return;
  g.pathIdx = (g.pathIdx + 1) % g.path.length;
  g.x = g.path[g.pathIdx].x;
  g.y = g.path[g.pathIdx].y;
}

// ── Animation ──────────────────────────────────────────────────────
let isUndoAnim = false;   // true during undo reversal
let undoRestoreCherries = []; // cherries to reappear during undo

function undoMove() {
  if (undoStack.length === 0 || animating || deathAnimating) return;

  // Capture current positions as "from" (we'll lerp back to snap positions)
  const fromPacs   = gs.pacs.map(p => ({ x: p.x, y: p.y }));
  const fromGhosts = gs.ghosts.map(g => ({ x: g.x, y: g.y }));

  const snap = undoStack.pop();

  // Find cherries that were eaten (exist in snap but not in current)
  undoRestoreCherries = snap.cherries.filter(sc =>
    !gs.cherries.some(c => c.x === sc.x && c.y === sc.y)
  );

  restoreSnap(snap);

  // Set px/py to the "from" positions so lerp plays the reversal
  gs.pacs.forEach((p, i) => {
    p.px = fromPacs[i].x;
    p.py = fromPacs[i].y;
  });
  gs.ghosts.forEach((g, i) => {
    g.px = fromGhosts[i].x;
    g.py = fromGhosts[i].y;
  });

  isUndoAnim = true;
  playUndoSound();
  updateHUD();
  startAnim();
}

function playUndoSound() {
  try {
    const ac = getAC(); const t = ac.currentTime;
    const o = ac.createOscillator(); const g = ac.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(600, t);
    o.frequency.linearRampToValueAtTime(300, t + 0.18);
    g.gain.setValueAtTime(0.18, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
    o.connect(g); g.connect(ac.destination);
    o.start(t); o.stop(t + 0.22);
  } catch(e) {}
}

function startAnim() {
  animating = true;
  animT = 0;
  animStart = performance.now();
}

function ease(t) { return 1 - Math.pow(1 - t, 3); }

// ── Canvas & drawing ───────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let CELL = 64;

function setupCanvas() {
  if (!gs) return;
  const maxW = Math.min(window.innerWidth - 16, 380, window.innerHeight * 0.55);
  CELL = Math.floor(maxW / gs.cols);
  const W = CELL * gs.cols, H = CELL * gs.rows;
  canvas.width = W; canvas.height = H;
  const cc = document.getElementById('cc');
  cc.width = W; cc.height = H;
  const hc = document.getElementById('hint-arrow');
  hc.width = W; hc.height = H;
}

function lerp(a, b, t) { return a + (b - a) * t; }

function drawGrid() {
  const W = CELL * gs.cols, H = CELL * gs.rows;
  ctx.fillStyle = '#05050a';
  ctx.fillRect(0, 0, W, H);
  for (let c = 0; c < gs.cols; c++) {
    for (let r = 0; r < gs.rows; r++) {
      ctx.fillStyle = (c+r)%2===0 ? 'rgba(0,229,255,.018)' : 'rgba(180,79,255,.014)';
      ctx.fillRect(c*CELL, r*CELL, CELL, CELL);
    }
  }
  ctx.strokeStyle = 'rgba(0,229,255,.07)'; ctx.lineWidth = 0.5;
  for (let r = 1; r < gs.rows; r++) {
    ctx.beginPath(); ctx.moveTo(0,r*CELL); ctx.lineTo(W,r*CELL); ctx.stroke();
  }
  for (let c = 1; c < gs.cols; c++) {
    ctx.beginPath(); ctx.moveTo(c*CELL,0); ctx.lineTo(c*CELL,H); ctx.stroke();
  }
  ctx.strokeStyle = 'rgba(0,229,255,.22)'; ctx.lineWidth = 1.5;
  ctx.strokeRect(.75,.75,W-1.5,H-1.5);
}

function drawBlock(x, y) {
  const px = x*CELL+3, py = y*CELL+3, s = CELL-6;
  ctx.fillStyle = '#0e0a1a'; ctx.fillRect(px,py,s,s);
  ctx.strokeStyle = '#b44fff'; ctx.lineWidth = 1.5; ctx.strokeRect(px,py,s,s);
  const g = ctx.createRadialGradient(px+s/2,py+s/2,0,px+s/2,py+s/2,s*.7);
  g.addColorStop(0,'rgba(180,79,255,.18)'); g.addColorStop(1,'rgba(180,79,255,0)');
  ctx.fillStyle=g; ctx.fillRect(px,py,s,s);
  ctx.strokeStyle='rgba(180,79,255,.7)'; ctx.lineWidth=2; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(px+7,py+7); ctx.lineTo(px+s-7,py+s-7);
  ctx.moveTo(px+s-7,py+7); ctx.lineTo(px+7,py+s-7); ctx.stroke();
  ctx.lineCap='butt';
}

function drawCherry(x, y, now) {
  const cx = x*CELL+CELL/2, cy = y*CELL+CELL/2;
  const pulse = .85 + .15*Math.sin(now*.0035 + x*1.2 + y*.9);
  const r = CELL*.215 * pulse;
  // Glow
  const grd = ctx.createRadialGradient(cx,cy,0,cx,cy,r*2.4);
  grd.addColorStop(0,'rgba(255,34,85,.28)'); grd.addColorStop(1,'rgba(255,34,85,0)');
  ctx.fillStyle=grd; ctx.beginPath(); ctx.arc(cx,cy,r*2.4,0,Math.PI*2); ctx.fill();
  // Stem
  ctx.strokeStyle='#44cc22'; ctx.lineWidth=1.5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(cx, cy-r*.9);
  ctx.quadraticCurveTo(cx+r*.7, cy-r*1.8, cx+r*.4, cy-r*2.4); ctx.stroke();
  ctx.lineCap='butt';
  // Berry
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.fillStyle='#ff2255'; ctx.fill();
  ctx.strokeStyle='rgba(255,100,140,.5)'; ctx.lineWidth=1; ctx.stroke();
  // Shine
  ctx.beginPath(); ctx.arc(cx-r*.33, cy-r*.33, r*.3, 0, Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,.52)'; ctx.fill();
}

// Draw the LOS sight beam for a T ghost that is mid-chase
function drawGhostSightBeam(g, et, now) {
  if (g.type !== 'T') return;
  // During a chase: beam goes from animated ghost position to its target (g.x,g.y)
  // Before a chase: show a faint preview beam ahead if pac is in LOS
  let beamFromX, beamFromY, beamToX, beamToY;
  if (g.chasing) {
    // Ghost is lunging — beam from lerped pos toward destination
    beamFromX = lerp(g.px, g.x, et) * CELL + CELL/2;
    beamFromY = lerp(g.py, g.y, et) * CELL + CELL/2;
    beamToX   = g.x * CELL + CELL/2;
    beamToY   = g.y * CELL + CELL/2;
  } else {
    // Ghost on patrol — show faint warning beam if pac is ahead
    const target = ghostLOS(g);
    if (!target) return;
    beamFromX = g.x * CELL + CELL/2;
    beamFromY = g.y * CELL + CELL/2;
    beamToX   = target.pac.x * CELL + CELL/2;
    beamToY   = target.pac.y * CELL + CELL/2;
  }

  const pulse = 0.4 + 0.35 * Math.sin(now * 0.008);
  const alpha = g.chasing ? 0.85 : pulse * 0.55;

  ctx.save();
  const grad = ctx.createLinearGradient(beamFromX, beamFromY, beamToX, beamToY);
  grad.addColorStop(0, `rgba(255,60,60,${alpha})`);
  grad.addColorStop(0.6, `rgba(255,120,30,${alpha * 0.6})`);
  grad.addColorStop(1, `rgba(255,60,60,0.04)`);
  ctx.strokeStyle = grad;
  ctx.lineWidth = g.chasing ? CELL * 0.18 : CELL * 0.10;
  ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(beamFromX, beamFromY); ctx.lineTo(beamToX, beamToY); ctx.stroke();
  ctx.shadowColor = '#ff3300'; ctx.shadowBlur = g.chasing ? 22 : 10;
  ctx.lineWidth = 2;
  ctx.strokeStyle = `rgba(255,80,30,${alpha})`;
  ctx.beginPath(); ctx.moveTo(beamFromX, beamFromY); ctx.lineTo(beamToX, beamToY); ctx.stroke();
  ctx.shadowBlur = 0; ctx.lineCap = 'butt';
  ctx.restore();
}

function drawGhost(vx, vy, type, now, chasing) {
  const cx = vx*CELL+CELL/2, cy = vy*CELL+CELL/2;
  const r = CELL*.36;
  // T = red aggressive, W = blue normal
  const col = type==='T' ? '#ff3333' : '#33aaff';
  const wob = .5 + .5*Math.sin(now*.003 + (type==='W'?Math.PI:0));

  ctx.save();

  // Extra angry glow when T is chasing
  if (chasing) {
    ctx.shadowColor = '#ff2200';
    ctx.shadowBlur = 20 + 10 * wob;
  } else {
    ctx.shadowColor = col;
    ctx.shadowBlur = 12 + 6*wob;
  }

  // Body
  ctx.beginPath();
  ctx.arc(cx, cy-r*.12, r, Math.PI, 0, false);
  const botY = cy+r*.78, bH = r*.38, bW = (r*2)/3;
  ctx.lineTo(cx+r, botY);
  ctx.quadraticCurveTo(cx+r-bW*.5,  botY+bH, cx+r-bW,   botY);
  ctx.quadraticCurveTo(cx+r-bW*1.5, botY+bH, cx+r-bW*2, botY);
  ctx.quadraticCurveTo(cx+r-bW*2.5, botY+bH, cx-r,      botY);
  ctx.lineTo(cx-r, cy-r*.12);
  ctx.closePath();
  ctx.fillStyle = col; ctx.fill();
  ctx.shadowBlur = 0;

  // Eyes — normal or angry (angled inward when chasing)
  if (chasing) {
    // Angry angled eyebrows + glowing red pupils
    [-0.3, 0.3].forEach((ex, i) => {
      const eyeCX = cx + ex*r, eyeCY = cy - r*.05;
      // White
      ctx.beginPath(); ctx.ellipse(eyeCX, eyeCY, r*.22, r*.27, 0, 0, Math.PI*2);
      ctx.fillStyle='white'; ctx.fill();
      // Red glowing pupil
      ctx.beginPath(); ctx.ellipse(eyeCX + (i===0?r*.06:-r*.06), eyeCY + r*.03, r*.13, r*.16, 0, 0, Math.PI*2);
      ctx.fillStyle='#ff1100'; ctx.shadowColor='#ff3300'; ctx.shadowBlur=8; ctx.fill(); ctx.shadowBlur=0;
      // Angry brow line (tilted inward toward nose)
      const browAngle = i===0 ? -0.4 : 0.4;
      ctx.strokeStyle='rgba(200,0,0,.9)'; ctx.lineWidth=1.8; ctx.lineCap='round';
      ctx.beginPath();
      ctx.moveTo(eyeCX - r*.2*Math.cos(browAngle) - r*.08, eyeCY - r*.32 - r*.08*Math.sin(browAngle));
      ctx.lineTo(eyeCX + r*.2*Math.cos(browAngle) + r*.08, eyeCY - r*.32 + r*.08*Math.sin(browAngle));
      ctx.stroke(); ctx.lineCap='butt';
    });
  } else {
    // Normal calm eyes
    [-0.3, 0.3].forEach(ex => {
      ctx.beginPath(); ctx.ellipse(cx+ex*r, cy-r*.05, r*.22, r*.27, 0, 0, Math.PI*2);
      ctx.fillStyle='white'; ctx.fill();
      ctx.beginPath(); ctx.ellipse(cx+ex*r+r*.05, cy+r*.02, r*.12, r*.15, 0, 0, Math.PI*2);
      ctx.fillStyle = type==='T' ? '#440000' : '#001a33'; ctx.fill();
    });
  }
  ctx.restore();
}

function drawPac(vx, vy, facing, animT, id) {
  const cx = vx*CELL+CELL/2, cy = vy*CELL+CELL/2;
  const r = CELL*.39;
  const col = id===0 ? '#FFD700' : '#FFB800';
  const fA = {right:0, left:Math.PI, up:-Math.PI/2, down:Math.PI/2};
  const angle = fA[facing] || 0;

  // Glow
  const grd = ctx.createRadialGradient(cx,cy,0,cx,cy,r*1.65);
  grd.addColorStop(0,'rgba(255,215,0,.22)'); grd.addColorStop(1,'rgba(255,215,0,0)');
  ctx.fillStyle=grd; ctx.beginPath(); ctx.arc(cx,cy,r*1.65,0,Math.PI*2); ctx.fill();

  // Body — rotated so mouth always opens in facing direction
  const maxMouth = .24*Math.PI;
  const mouth = maxMouth * Math.abs(Math.sin(animT*Math.PI));
  ctx.save();
  ctx.translate(cx, cy); ctx.rotate(angle);
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.arc(0, 0, r, mouth, Math.PI*2 - mouth);
  ctx.closePath();
  ctx.fillStyle = col;
  ctx.shadowColor = '#ffcc00'; ctx.shadowBlur = 14;
  ctx.fill(); ctx.shadowBlur = 0;
  ctx.restore();

  // Eye — screen-space positions that stay in upper body for all directions
  //   right: upper-right   left: upper-left   up: right side   down: right side lower
  const eyePos = {
    right: [cx + r*0.22,  cy - r*0.38],
    left:  [cx - r*0.22,  cy - r*0.38],
    up:    [cx + r*0.38,  cy - r*0.18],
    down:  [cx + r*0.38,  cy + r*0.22],
  }[facing] || [cx + r*0.22, cy - r*0.38];
  ctx.beginPath(); ctx.arc(eyePos[0], eyePos[1], r*0.11, 0, Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,.88)'; ctx.fill();
}

// ── Death animation ────────────────────────────────────────────────
let deathAnimating = false;
let deathAnimStart = 0;
const DEATH_ANIM_MS = 900;
let deathPacs = []; // [{x,y,facing,id}] snapped at time of death

function playDeathSound() {
  try {
    const ac = getAC(); const t = ac.currentTime;
    // Descending wail
    const o = ac.createOscillator(); const g = ac.createGain();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(600, t);
    o.frequency.exponentialRampToValueAtTime(40, t + 0.85);
    g.gain.setValueAtTime(0.0, t);
    g.gain.linearRampToValueAtTime(0.4, t + 0.05);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.9);
    o.connect(g); g.connect(ac.destination);
    o.start(t); o.stop(t + 0.9);
    // High shriek on top
    const o2 = ac.createOscillator(); const g2 = ac.createGain();
    o2.type = 'square';
    o2.frequency.setValueAtTime(1200, t);
    o2.frequency.exponentialRampToValueAtTime(80, t + 0.55);
    g2.gain.setValueAtTime(0.18, t);
    g2.gain.exponentialRampToValueAtTime(0.001, t + 0.55);
    o2.connect(g2); g2.connect(ac.destination);
    o2.start(t); o2.stop(t + 0.55);
  } catch(e) {}
}

function startDeathAnim() {
  // Snap pac positions at moment of death
  deathPacs = gs.pacs.map(p => ({ x: p.x, y: p.y, facing: p.facing, id: p.id }));
  deathAnimating = true;
  deathAnimStart = performance.now();
  playDeathSound();
}

function drawPacDying(vx, vy, facing, t, id) {
  // t: 0 = just died, 1 = fully gone
  const cx = vx*CELL+CELL/2, cy = vy*CELL+CELL/2;
  const fA = {right:0, left:Math.PI, up:-Math.PI/2, down:Math.PI/2};
  const a  = fA[facing] || 0;

  // Phase 1 (0 → 0.72): mouth sweeps open from normal → full 360° (pac vanishes)
  // Phase 2 (0.72 → 1.0): body shrinks + fades
  const openPhase  = Math.min(1, t / 0.72);
  const shrinkPhase = Math.max(0, (t - 0.72) / 0.28);

  // Mouth gap widens: starts at 0.24π, reaches π (half-open = crescent),
  // continues until 2π–epsilon (pac is just a closing sliver of arc)
  const mouthGap = lerp(0.24 * Math.PI, Math.PI * 0.98, easeInQuad(openPhase));

  // Body scale: 1 during open phase, then shrinks
  const scale = 1 - easeInQuad(shrinkPhase) * 0.95;
  const r = CELL * 0.39 * scale;
  if (r < 1) return;

  // Colour: yellow → orange → dark red as t increases
  const rc = Math.round(lerp(255, 180, Math.min(1, t * 1.4)));
  const gc = Math.round(lerp(215,   0, Math.min(1, t * 1.2)));
  const bodyCol = `rgb(${rc},${gc},0)`;

  // ── Impact flash ring (only the first ~15% of the anim) ────────────
  if (t < 0.18) {
    const flashT = t / 0.18;
    const flashR = CELL * 0.5 * (0.5 + flashT * 1.2);
    const grd = ctx.createRadialGradient(cx,cy,0,cx,cy,flashR);
    grd.addColorStop(0, `rgba(255,80,0,${0.6*(1-flashT)})`);
    grd.addColorStop(0.5, `rgba(255,200,0,${0.3*(1-flashT)})`);
    grd.addColorStop(1, 'rgba(255,0,0,0)');
    ctx.fillStyle = grd;
    ctx.beginPath(); ctx.arc(cx,cy,flashR,0,Math.PI*2); ctx.fill();
  }

  // ── Glow (fades with body) ─────────────────────────────────────────
  const glowAlpha = (1 - t) * 0.28;
  if (glowAlpha > 0.01) {
    const grd2 = ctx.createRadialGradient(cx,cy,0,cx,cy,r*1.7);
    grd2.addColorStop(0, `rgba(255,80,0,${glowAlpha*2})`);
    grd2.addColorStop(1, 'rgba(255,0,0,0)');
    ctx.fillStyle = grd2;
    ctx.beginPath(); ctx.arc(cx,cy,r*1.7,0,Math.PI*2); ctx.fill();
  }

  // ── Body ───────────────────────────────────────────────────────────
  // Arc sweeps from mouthGap to 2π−mouthGap, rotating CCW as it opens
  // so the pac "fans open" like a flower petal closing wrong
  const spin = openPhase * Math.PI * 0.55; // slight spin during open
  const arcA = a + spin;
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.arc(cx, cy, r, arcA + mouthGap, arcA + Math.PI*2 - mouthGap);
  ctx.closePath();
  ctx.fillStyle = bodyCol;
  ctx.shadowColor = '#ff4400';
  ctx.shadowBlur = (1-t) * 18;
  ctx.fill();
  ctx.shadowBlur = 0;

  // ── Eye fades out in first 35% ─────────────────────────────────────
  if (t < 0.35) {
    const eyeAlpha = 1 - t / 0.35;
    const eyePos = {
      right: [cx + r*0.22,  cy - r*0.38],
      left:  [cx - r*0.22,  cy - r*0.38],
      up:    [cx + r*0.38,  cy - r*0.18],
      down:  [cx + r*0.38,  cy + r*0.22],
    }[facing] || [cx + r*0.22, cy - r*0.38];
    ctx.globalAlpha = eyeAlpha;
    ctx.beginPath(); ctx.arc(eyePos[0], eyePos[1], r*0.11, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(0,0,0,.88)'; ctx.fill();
    ctx.globalAlpha = 1;
  }

  // ── Debris sparks fly outward (t 0.15 → 0.85) ─────────────────────
  if (t > 0.15 && t < 0.85) {
    const sparkT = (t - 0.15) / 0.7; // 0→1 over spark window
    const NUM = 10;
    for (let i = 0; i < NUM; i++) {
      const angle = (i / NUM) * Math.PI * 2 + t * 2.8 + id * 1.1;
      const dist  = CELL * 0.62 * easeOutCubic(sparkT);
      const sx    = cx + Math.cos(angle) * dist;
      const sy    = cy + Math.sin(angle) * dist;
      const sr    = Math.max(0, CELL * 0.065 * (1 - sparkT));
      const alpha = Math.max(0, 1 - sparkT * 1.25);
      const sparkG = Math.round(lerp(180, 0, sparkT));
      ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI*2);
      ctx.fillStyle = `rgba(255,${sparkG},0,${alpha})`;
      ctx.fill();
    }
  }
}

function easeInQuad(t) { return t * t; }
function easeOutCubic(t) { return 1 - Math.pow(1-t, 3); }

function drawCherryEating(cx, cy, eatProgress) {
  // eatProgress: 0 = pac just arrived, 1 = fully swallowed
  // Cherry shrinks, flashes bright, then pops into particles
  const scale = Math.max(0, 1 - eatProgress);
  const r = CELL * .215 * scale;
  if (r < 0.5) return;

  ctx.save();
  ctx.translate(cx, cy);

  // Flash white as it's being eaten
  const flashAlpha = Math.max(0, 1 - eatProgress * 1.5);

  // Burst glow ring expanding outward
  if (eatProgress < 0.6) {
    const burstR = CELL * .3 * (1 + eatProgress * 2.2);
    const grd = ctx.createRadialGradient(0,0,0,0,0,burstR);
    grd.addColorStop(0, `rgba(255,80,120,${0.5 * (1-eatProgress*1.6)})`);
    grd.addColorStop(0.4, `rgba(255,220,0,${0.3 * (1-eatProgress*1.6)})`);
    grd.addColorStop(1, 'rgba(255,0,80,0)');
    ctx.fillStyle = grd;
    ctx.beginPath(); ctx.arc(0,0,burstR,0,Math.PI*2); ctx.fill();
  }

  // Stem (fades out early)
  if (eatProgress < 0.4) {
    ctx.globalAlpha = 1 - eatProgress * 2.5;
    ctx.strokeStyle = '#44cc22'; ctx.lineWidth = 1.5; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(0, -r*.9);
    ctx.quadraticCurveTo(r*.7, -r*1.8, r*.4, -r*2.4); ctx.stroke();
    ctx.lineCap = 'butt';
    ctx.globalAlpha = 1;
  }

  // Berry — squishes as it shrinks
  const squishX = 1 + eatProgress * 0.4;
  const squishY = 1 - eatProgress * 0.3;
  ctx.scale(squishX, squishY);
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2);
  ctx.fillStyle = '#ff2255'; ctx.fill();

  // White flash overlay
  if (flashAlpha > 0) {
    ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${flashAlpha * 0.85})`;
    ctx.fill();
  }

  // Shine
  ctx.beginPath(); ctx.arc(-r*.33, -r*.33, r*.3, 0, Math.PI*2);
  ctx.fillStyle = `rgba(255,255,255,${0.52 * (1-eatProgress)})`; ctx.fill();

  // Sparkle dots flying outward
  if (eatProgress > 0.1) {
    const numSparks = 6;
    for (let i = 0; i < numSparks; i++) {
      const angle = (i / numSparks) * Math.PI * 2 + eatProgress;
      const dist = CELL * .38 * eatProgress;
      const sx = Math.cos(angle) * dist / squishX;
      const sy = Math.sin(angle) * dist / squishY;
      const sr = Math.max(0, CELL * .055 * (1 - eatProgress));
      const sparkColors = ['#FFD700','#ff2255','#ffffff','#ff8833'];
      ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI*2);
      ctx.fillStyle = sparkColors[i % sparkColors.length];
      ctx.globalAlpha = Math.max(0, 1 - eatProgress * 1.3);
      ctx.fill(); ctx.globalAlpha = 1;
    }
  }

  ctx.restore();
}

function draw(t, now) {
  if (!gs) return;
  // Undo uses ease-in (acceleration) to feel like rewinding
  const et = isUndoAnim ? easeInQuad(t) : ease(t);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawGrid();

  // Purple rewind tint overlay during undo — pulses in and out
  if (isUndoAnim) {
    const tintAlpha = 0.13 * Math.sin(t * Math.PI);
    ctx.fillStyle = `rgba(160,80,255,${tintAlpha})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  gs.blocks.forEach(b => drawBlock(b.x, b.y));

  // Draw regular cherries (already restored into gs.cherries by restoreSnap)
  const eatingSet = new Set((gs.pendingEat||[]).map(e => `${e.x},${e.y}`));
  gs.cherries.forEach(c => {
    // During undo: restored cherries pop in during second half of animation
    const isRestored = isUndoAnim && undoRestoreCherries.some(rc => rc.x === c.x && rc.y === c.y);
    if (isRestored) {
      const appearT = Math.max(0, (t - 0.45) / 0.55);
      const scale = ease(appearT);
      if (scale <= 0) return;
      const cx = c.x * CELL + CELL/2, cy = c.y * CELL + CELL/2;
      ctx.save();
      ctx.translate(cx, cy); ctx.scale(scale, scale); ctx.translate(-cx, -cy);
      ctx.globalAlpha = appearT;
      drawCherry(c.x, c.y, now);
      ctx.globalAlpha = 1;
      ctx.restore();
    } else if (!eatingSet.has(`${c.x},${c.y}`)) {
      drawCherry(c.x, c.y, now);
    }
  });

  // Cherry eat animation (forward moves only)
  if (!isUndoAnim && gs.pendingEat && gs.pendingEat.length > 0 && t > 0) {
    const EAT_START = 0.45;
    gs.pendingEat.forEach(e => {
      const cx = e.x * CELL + CELL/2, cy = e.y * CELL + CELL/2;
      if (et < EAT_START) {
        drawCherry(e.x, e.y, now);
      } else {
        const eatProgress = Math.min(1, (et - EAT_START) / (1 - EAT_START));
        if (!e.eaten) { e.eaten = true; playEat(); }
        drawCherryEating(cx, cy, eatProgress);
      }
    });
  }

  // Ghost patrol paths
  gs.ghosts.forEach(g => drawGhostTrail(g));
  // Sight beams for T ghosts
  gs.ghosts.forEach(g => { if (g.type === 'T') drawGhostSightBeam(g, et, now); });
  // Ghosts
  gs.ghosts.forEach(g => {
    drawGhost(lerp(g.px,g.x,et), lerp(g.py,g.y,et), g.type, now, g.chasing);
  });
  // Pacs — during undo, derive facing from actual movement delta
  if (deathAnimating) {
    const dt = Math.min((performance.now() - deathAnimStart) / DEATH_ANIM_MS, 1);
    deathPacs.forEach(p => drawPacDying(p.x, p.y, p.facing, dt, p.id));
  } else {
    gs.pacs.forEach(p => {
      let facing = p.facing;
      if (isUndoAnim) {
        // px,py = where pac came FROM (current pos before undo)
        // x,y   = where pac is going TO (restored pos)
        // Direction of travel = TO - FROM
        const dx = p.x - p.px, dy = p.y - p.py;
        if      (dx > 0) facing = 'right';
        else if (dx < 0) facing = 'left';
        else if (dy > 0) facing = 'down';
        else if (dy < 0) facing = 'up';
      }
      drawPac(lerp(p.px,p.x,et), lerp(p.py,p.y,et), facing, t, p.id);
    });
  }
}

function drawGhostTrail(g) {
  if (g.path.length < 2) return;
  const col = g.type === 'T' ? 'rgba(255,50,50,.35)' : 'rgba(51,170,255,.32)';
  ctx.save();
  ctx.strokeStyle = col;
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.setLineDash([CELL * 0.12, CELL * 0.18]);
  ctx.beginPath();
  g.path.forEach((pt, i) => {
    const px = pt.x * CELL + CELL / 2;
    const py = pt.y * CELL + CELL / 2;
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  });
  // Close back to start to show the full ping-pong loop
  ctx.lineTo(g.path[0].x * CELL + CELL / 2, g.path[0].y * CELL + CELL / 2);
  ctx.stroke();
  // Draw small circle at each waypoint
  ctx.setLineDash([]);
  ctx.lineWidth = 1.5;
  g.path.forEach((pt, i) => {
    const px = pt.x * CELL + CELL / 2;
    const py = pt.y * CELL + CELL / 2;
    ctx.beginPath();
    ctx.arc(px, py, CELL * 0.07, 0, Math.PI * 2);
    ctx.fillStyle = col;
    ctx.fill();
  });
  ctx.lineCap = 'butt';
  ctx.restore();
}

// ── Hint & Solve ───────────────────────────────────────────────────
function getSolution() { return SOLUTIONS[levelIdx] || []; }

function showHint() {
  stopSolve();
  const sol = getSolution();
  // hintStep tracks how many moves the player has made that match the solution;
  // sync it to undoStack length so undo works naturally
  const step = Math.min(undoStack.length, sol.length - 1);
  hintStep = step;
  drawHintArrow(sol[step]);
  // Clear arrow after 1.8s
  clearTimeout(showHint._timer);
  showHint._timer = setTimeout(clearHintArrow, 1800);
}

function drawHintArrow(dir) {
  const hc = document.getElementById('hint-arrow');
  if (!hc || !gs) return;
  const hx = hc.getContext('2d');
  hx.clearRect(0, 0, hc.width, hc.height);

  const dirMap = { up:[0,-1], down:[0,1], left:[-1,0], right:[1,0] };
  const [ddx, ddy] = dirMap[dir] || [0,0];
  const arrowAngle = Math.atan2(ddy, ddx);

  gs.pacs.forEach(p => {
    const cx = p.x * CELL + CELL / 2;
    const cy = p.y * CELL + CELL / 2;
    const tipX = cx + ddx * CELL * 0.72;
    const tipY = cy + ddy * CELL * 0.72;

    hx.save();
    hx.translate(tipX, tipY);
    hx.rotate(arrowAngle);

    const len = CELL * 0.38;
    const hw  = CELL * 0.14;

    // Glow
    hx.shadowColor = '#00e5ff';
    hx.shadowBlur = 16;

    // Arrow body
    hx.beginPath();
    hx.moveTo(len * 0.5, 0);           // tip
    hx.lineTo(-len * 0.3,  hw * 0.75); // right base
    hx.lineTo(-len * 0.05, hw * 0.35); // right notch
    hx.lineTo(-len * 0.5,  hw * 0.35); // right tail
    hx.lineTo(-len * 0.5, -hw * 0.35); // left tail
    hx.lineTo(-len * 0.05,-hw * 0.35); // left notch
    hx.lineTo(-len * 0.3, -hw * 0.75); // left base
    hx.closePath();
    hx.fillStyle = 'rgba(0,229,255,0.88)';
    hx.fill();
    hx.shadowBlur = 0;

    // Outline
    hx.strokeStyle = 'rgba(255,255,255,0.6)';
    hx.lineWidth = 1.2;
    hx.stroke();

    hx.restore();
  });
}

function clearHintArrow() {
  const hc = document.getElementById('hint-arrow');
  if (!hc) return;
  hc.getContext('2d').clearRect(0, 0, hc.width, hc.height);
}

let _solving = false;
let _solveInputting = false;

function toggleSolve() {
  if (_solving) { stopSolve(); return; }
  startSolve();
}

function startSolve() {
  stopSolve();
  const ate = totalCherries - gs.cherries.length;
  score = Math.max(0, score - ate * 10);
  loadLevel(levelIdx);
  _solving = true;
  document.getElementById('btn-solve').classList.add('active');
  document.getElementById('btn-solve').textContent = '⏹ STOP';

  const sol = getSolution();
  let step = 0;

  function playNext() {
    if (!_solving || step >= sol.length) { stopSolve(); return; }
    if (gs.dead || gs.won) { stopSolve(); return; }
    if (animating) { solveTimer = setTimeout(playNext, 60); return; }

    const dir = sol[step];
    drawHintArrow(dir);
    step++;
    _solveInputting = true;
    inp(dir);
    _solveInputting = false;
    solveTimer = setTimeout(playNext, ANIM_MS + 120);
  }
  solveTimer = setTimeout(playNext, 350);
}

function stopSolve() {
  _solving = false;
  clearTimeout(solveTimer);
  clearTimeout(showHint._timer);
  clearHintArrow();
  const btn = document.getElementById('btn-solve');
  if (btn) { btn.classList.remove('active'); btn.textContent = '▶ SOLVE'; }
}

// ── Main loop ──────────────────────────────────────────────────────
function gameLoop(now) {
  requestAnimationFrame(gameLoop);

  // Death animation runs independently after move anim finishes
  if (deathAnimating) {
    const dt = Math.min((now - deathAnimStart) / DEATH_ANIM_MS, 1);
    draw(1, now); // keep board drawn
    if (dt >= 1) {
      deathAnimating = false;
      showOv('ov-dead');
    }
    return;
  }

  if (animating) {
    animT = Math.min((now - animStart) / ANIM_MS, 1);
    draw(animT, now);
    if (animT >= 1) {
      animating = false;
      isUndoAnim = false;
      undoRestoreCherries = [];
      // Commit deferred cherry eats now that pac has visually arrived
      commitPendingEats();

      if (gs.dead) {
        startDeathAnim(); // plays death anim, shows overlay after it finishes
      } else if (gs.won) {
        playWin();
        setTimeout(() => {
          launchConfetti();
          if (levelIdx + 1 >= LEVELS.length) {
            document.getElementById('done-score').textContent = `Final score: ${score}`;
            showOv('ov-done');
          } else {
            document.getElementById('win-sub').textContent = `Level ${levelIdx+1} complete! +${totalCherries*10} pts`;
            showOv('ov-win');
          }
        }, 250);
      } else if (pendingDir) {
        const d = pendingDir; pendingDir = null;
        processTurn(d);
      }
    }
  } else {
    draw(1, now); // continuous redraw for cherry pulse
  }
}

// ── UI helpers ─────────────────────────────────────────────────────
function showOv(id) { document.getElementById(id).classList.add('show'); }
function hideOv(id) { document.getElementById(id).classList.remove('show'); }

function startGame() { hideOv('ov-start'); }
function nextLevel() {
  hideOv('ov-win');
  stopSolve();
  levelIdx++;
  loadLevel(levelIdx);
}
function retryLevel() {
  hideOv('ov-dead'); hideOv('ov-win');
  stopSolve();
  const ate = totalCherries - gs.cherries.length;
  score = Math.max(0, score - ate * 10);
  loadLevel(levelIdx);
}
function restartAll() {
  hideOv('ov-done');
  score = 0; levelIdx = 0;
  loadLevel(0);
  updateHUD();
}

function inp(dir) {
  if (_solving && !_solveInputting) stopSolve(); // player took over
  getAC();
  processTurn(dir);
}

function updateHUD() {
  document.getElementById('score-disp').textContent = score;
  document.getElementById('level-disp').textContent = levelIdx + 1;
}

function updateCherryBar() {
  const bar = document.getElementById('cherry-bar');
  bar.innerHTML = '';
  for (let i = 0; i < totalCherries; i++) {
    const d = document.createElement('div');
    d.className = 'c-dot' + (i >= gs.cherries.length ? ' eaten' : '');
    bar.appendChild(d);
  }
}

// ── Keyboard ───────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  const map = { ArrowLeft:'left', ArrowRight:'right', ArrowUp:'up', ArrowDown:'down',
                a:'left', d:'right', w:'up', s:'down' };
  if (map[e.key]) { e.preventDefault(); inp(map[e.key]); }
  if (e.key==='z'||e.key==='Z') undoMove();
  if (e.key==='r'||e.key==='R') retryLevel();
  if (e.key==='Enter') {
    if (document.getElementById('ov-start').classList.contains('show')) { startGame(); }
    else if (document.getElementById('ov-win').classList.contains('show'))  { nextLevel(); }
    else if (document.getElementById('ov-dead').classList.contains('show')) { retryLevel(); }
    else if (document.getElementById('ov-done').classList.contains('show')) { restartAll(); }
  }
});

// ── Touch swipe on canvas ──────────────────────────────────────────
let _tx0 = 0, _ty0 = 0;
document.getElementById('field-wrap').addEventListener('pointerdown', e => {
  _tx0 = e.clientX; _ty0 = e.clientY;
});
document.getElementById('field-wrap').addEventListener('pointerup', e => {
  const dx = e.clientX - _tx0, dy = e.clientY - _ty0;
  if (Math.abs(dx) < 8 && Math.abs(dy) < 8) return;
  if (Math.abs(dx) > Math.abs(dy)) inp(dx > 0 ? 'right' : 'left');
  else inp(dy > 0 ? 'down' : 'up');
});

// ── Confetti ───────────────────────────────────────────────────────
const CONF_COLS = ['#FFD700','#ff2255','#00e5ff','#b44fff','#c8ff00','#ff6b35'];
let confPieces = [];

function launchConfetti() {
  const cc = document.getElementById('cc');
  confPieces = Array.from({length:70}, () => ({
    x: Math.random()*cc.width, y: -10,
    vx: (Math.random()-.5)*3.5, vy: 2.2+Math.random()*3.5,
    r: 4+Math.random()*5,
    color: CONF_COLS[Math.floor(Math.random()*CONF_COLS.length)],
    rot: Math.random()*Math.PI*2, rotV: (Math.random()-.5)*.22,
    life: 1, decay: .009+Math.random()*.007,
  }));
  runConf();
}
function runConf() {
  const cc = document.getElementById('cc');
  const cx = cc.getContext('2d');
  cx.clearRect(0,0,cc.width,cc.height);
  confPieces.forEach(p => {
    p.x+=p.vx; p.y+=p.vy; p.vy+=.08; p.rot+=p.rotV; p.life-=p.decay;
    cx.globalAlpha = Math.max(0,p.life);
    cx.fillStyle = p.color;
    cx.save(); cx.translate(p.x,p.y); cx.rotate(p.rot);
    cx.fillRect(-p.r/2,-p.r/4,p.r,p.r/2);
    cx.restore();
  });
  cx.globalAlpha = 1;
  confPieces = confPieces.filter(p => p.life>0);
  if (confPieces.length > 0) requestAnimationFrame(runConf);
  else cx.clearRect(0,0,cc.width,cc.height);
}

// ── Init ───────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  loadLevel(0);
  requestAnimationFrame(gameLoop);
});
window.addEventListener('resize', () => { setupCanvas(); });
</script>

at = finalQ; }\n      gs.animating = false;\n      if (moveHistory.length === 0) {\n        document.getElementById('rewind-btn').style.opacity = '0.3';\n        document.getElementById('rewind-btn').style.pointerEvents = 'none';\n        boardDiverged = false;\n      }\n      draw();\n      if (gs.bombs.length > 0 || gs.blackholes.length > 0) startPulse(); else stopPulse();\n      return;\n    }\n    const seg = revSegs[idx];\n    const {fromC, fromR, toC, toR, dir} = seg;\n    const distCells = Math.max(1, Math.abs(toC-fromC) + Math.abs(toR-fromR));\n    const ballR = CELL * 0.41;\n    const distPx = distCells * CELL;\n    const msPer = Math.min(225, 100 + 125 / distCells);\n    const duration = Math.max(300, distCells * msPer);\n    const totalAngle = distPx / ballR * SPIN_MULT;\n    const [fax, fay, faz] = SPIN_AXES[dir] || SPIN_AXES.right;\n    const rax = -fax, ray = -fay, raz = -faz;\n    const segStartQ = currentQ.slice();\n    const start = performance.now();\n\n    function step(now) {\n      const t = Math.min((now - start) / duration, 1);\n      const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;\n      const cx = fromC + (toC-fromC)*ease;\n      const cr = fromR + (toR-fromR)*ease;\n      const frameQ = qNorm(qMul(qAxis(rax, ray, raz, ease*totalAngle), segStartQ));\n      const b = gs.balls[gs.activeBall];\n      if (b) { b.col = cx; b.row = cr; b.quat = frameQ; }\n      currentQ = frameQ;\n      draw(undefined, undefined, undefined, now);\n      if (t < 1) requestAnimationFrame(step);\n      else animateRevSeg(idx + 1);\n    }\n    requestAnimationFrame(step);\n  }\n\n  animateRevSeg(0);\n});\n\ndocument.getElementById('start-btn').addEventListener('click', () => {\n  const o = document.getElementById('start-overlay');\n  o.style.opacity='0'; o.style.pointerEvents='none';\n  document.getElementById('hud').style.display='flex';\n  document.getElementById('game-btns').style.display='flex';\n  // Pre-warm AudioContext from this user gesture so all future sounds work immediately\n  try { const ac = getAC(); ac.resume(); } catch(e) {}\n  gs.puzzleMode = true;\n  setupRound(1);\n});\ndocument.getElementById('next-btn').addEventListener('click', nextRound);\ndocument.getElementById('retry-btn').addEventListener('click', resetGame);\n\nresize();\nwindow.addEventListener('resize', resize);\n// Auto-skip start screen\n(function(){\n  const o = document.getElementById('start-overlay');\n  if(o){ o.style.opacity='0'; o.style.pointerEvents='none'; }\n  document.getElementById('hud').style.display='flex';\n  document.getElementById('game-btns').style.display='flex';\n  gs.puzzleMode = true;\n  setupRound(1);\n})();\n\n\n<\/script>\n</body>\n</html>",
  pacs:     "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no\">\n<title>TWO PACS</title>\n<link href=\"https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap\" rel=\"stylesheet\">\n<style>\n*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}\nhtml,body{width:100%;height:100%;overflow:hidden;background:#050508;display:flex;align-items:center;justify-content:center;}\n.pac-embed { font-family: 'Nunito', sans-serif; user-select: none; -webkit-user-select: none; touch-action: none; background:#050508; display: block; }\n\n#app { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; background: radial-gradient(ellipse 80% 55% at 50% 0%,rgba(0,229,255,.06) 0%,transparent 65%); padding: 10px 8px; position: relative; }\n#ov-start { position: absolute; inset: 0; z-index: 30; border-radius: 16px; }\n#hud { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 330px; padding: 0 8px; }\n.hud-block { display: flex; flex-direction: column; align-items: center; }\n.hud-label { font-size: 9px; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; color: rgba(0,229,255,.4); }\n.hud-val { font-size: 34px; font-weight: 900; line-height: 1; color: #fff; text-shadow: 0 0 14px #00e5ff, 0 0 36px rgba(0,229,255,.2); }\n#game-title { font-size: 13px; font-weight: 900; letter-spacing: 5px; text-transform: uppercase; color: rgba(255,255,255,.5); text-align: center; }\n#cherry-bar { display: flex; gap: 5px; justify-content: center; margin-top: 3px; flex-wrap: wrap; max-width: 120px; }\n.c-dot { width: 9px; height: 9px; border-radius: 50%; background: #ff2255; box-shadow: 0 0 6px rgba(255,34,85,.7); transition: all .2s; }\n.c-dot.eaten { background: rgba(255,34,85,.12); box-shadow: none; }\n#field-wrap { position: relative; box-shadow: 0 0 40px rgba(0,229,255,.08), 0 0 80px rgba(0,0,0,.95), inset 0 0 30px rgba(0,0,20,.5); border-radius: 4px; overflow: hidden; touch-action: none; }\ncanvas { display: block; }\n.overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,6,1); gap: 12px; z-index: 20; opacity: 0; pointer-events: none; transition: opacity .25s ease; }\n.overlay.show { opacity: 1; pointer-events: all; }\n.ov-title { font-size: 40px; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; color: #fff; line-height: 1; text-shadow: 0 0 28px #00e5ff, 0 0 56px rgba(0,229,255,.4); }\n.ov-sub { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,.4); text-align: center; }\n.btn { padding: 11px 30px; background: transparent; border: 2px solid #00e5ff; border-radius: 40px; color: #00e5ff; font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; box-shadow: 0 0 18px rgba(0,229,255,.3), inset 0 0 14px rgba(0,229,255,.06); transition: box-shadow .15s, transform .1s; }\n.btn:hover { box-shadow: 0 0 28px rgba(0,229,255,.6), inset 0 0 18px rgba(0,229,255,.14); }\n.btn:active { transform: scale(.96); }\n.btn-pink { border-color: #ff4466; color: #ff4466; box-shadow: 0 0 18px rgba(255,68,102,.3), inset 0 0 14px rgba(255,68,102,.06); }\n.btn-pink:hover { box-shadow: 0 0 28px rgba(255,68,102,.6), inset 0 0 18px rgba(255,68,102,.14); }\n#controls { display: flex; flex-direction: column; align-items: center; gap: 6px; }\n#d-pad { display: grid; grid-template-columns: 52px 52px 52px; grid-template-rows: 52px 52px; gap: 4px; }\n.d-btn { display: flex; align-items: center; justify-content: center; background: rgba(0,229,255,.05); border: 1.5px solid rgba(0,229,255,.18); border-radius: 12px; color: rgba(0,229,255,.65); font-size: 20px; cursor: pointer; transition: all .1s; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }\n.d-btn:active { background: rgba(0,229,255,.18); border-color: rgba(0,229,255,.6); color: #00e5ff; transform: scale(.9); }\n#action-row { display: flex; gap: 8px; }\n.a-btn { padding: 7px 18px; background: rgba(0,229,255,.04); border: 1.5px solid rgba(0,229,255,.18); border-radius: 30px; color: rgba(0,229,255,.5); font-family: 'Nunito', sans-serif; font-size: 11px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all .15s; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }\n.a-btn:active { background: rgba(0,229,255,.14); border-color: rgba(0,229,255,.5); color: rgba(0,229,255,.9); transform: scale(.95); }\n@media (max-width: 380px) { #hud, .d-btn { font-size: 18px; } .d-btn { width: 46px; height: 46px; } }\n#hint-arrow { position: absolute; inset: 0; pointer-events: none; z-index: 15; }\n.a-btn.active { background: rgba(0,229,255,.22); border-color: rgba(0,229,255,.7); color: rgba(0,229,255,1); box-shadow: 0 0 14px rgba(0,229,255,.5); }\n#hint-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }\n/* Fullscreen override */\n.pac-embed-outer{margin:0!important;border-radius:0!important;border:none!important;max-width:100vw!important;width:100%!important;}\n<\/style>\n</head>\n<body>\n<div class=\"pac-embed-outer\">\n<div class=\"pac-embed\" id=\"pac-game\">\n<div id=\"app\" style=\"position:relative\">\n  <div class=\"overlay show\" id=\"ov-start\">\n    <div class=\"ov-title\" style=\"margin-bottom:2px\">TWO PACS</div>\n    <canvas id=\"preview-canvas\" style=\"border-radius:6px;border:1px solid rgba(0,229,255,.18);\"></canvas>\n    <div class=\"ov-sub\" style=\"margin-top:2px\">Guide BOTH pacs \u00b7 Eat all cherries<br>Avoid the ghosts!</div>\n    <button class=\"btn\" onclick=\"startGame()\">PLAY</button>\n  </div>\n  <div id=\"hud\" style=\"visibility:hidden\">\n    <div class=\"hud-block\"><span class=\"hud-label\">Score</span><span class=\"hud-val\" id=\"score-disp\">0</span></div>\n    <div style=\"text-align:center\"><div id=\"game-title\">TWO PACS</div><div id=\"cherry-bar\"></div></div>\n    <div class=\"hud-block\"><span class=\"hud-label\">Level</span><span class=\"hud-val\" id=\"level-disp\">1</span></div>\n  </div>\n  <div id=\"field-wrap\">\n    <canvas id=\"canvas\"></canvas>\n    <canvas id=\"cc\" style=\"position:absolute;inset:0;pointer-events:none;z-index:10;\"></canvas>\n    <canvas id=\"hint-arrow\" style=\"position:absolute;inset:0;pointer-events:none;z-index:15;\"></canvas>\n    <div class=\"overlay\" id=\"ov-win\">\n      <div style=\"font-size:36px\">\ud83c\udf52</div>\n      <div class=\"ov-title\">CLEARED!</div>\n      <div class=\"ov-sub\" id=\"win-sub\">Level 1 complete</div>\n      <button class=\"btn\" onclick=\"nextLevel()\">NEXT \u2192</button>\n    </div>\n    <div class=\"overlay\" id=\"ov-done\">\n      <div style=\"font-size:36px\">\ud83c\udfc6</div>\n      <div class=\"ov-title\" style=\"font-size:28px\">ALL LEVELS<br>CLEARED!</div>\n      <div class=\"ov-sub\" id=\"done-score\"></div>\n      <button class=\"btn\" onclick=\"restartAll()\">PLAY AGAIN</button>\n    </div>\n    <div class=\"overlay\" id=\"ov-dead\">\n      <div style=\"font-size:36px\">\ud83d\udc7b</div>\n      <div class=\"ov-title\" style=\"color:#ff4466;text-shadow:0 0 28px #ff4466\">GOT YOU!</div>\n      <div class=\"ov-sub\">A ghost caught a pac</div>\n      <button class=\"btn btn-pink\" onclick=\"retryLevel()\">RETRY</button>\n    </div>\n  </div>\n  <div id=\"controls\" style=\"visibility:hidden\">\n    <div id=\"d-pad\">\n      <div></div>\n      <button class=\"d-btn\" onpointerdown=\"inp('up')\">\u25b2</button>\n      <div></div>\n      <button class=\"d-btn\" onpointerdown=\"inp('left')\">\u25c0</button>\n      <button class=\"d-btn\" onpointerdown=\"inp('down')\">\u25bc</button>\n      <button class=\"d-btn\" onpointerdown=\"inp('right')\">\u25b6</button>\n    </div>\n    <div id=\"action-row\">\n      <button class=\"a-btn\" onclick=\"undoMove()\">\u21a9 UNDO</button>\n      <button class=\"a-btn\" onclick=\"retryLevel()\">\u21ba RESTART</button>\n      <button class=\"a-btn\" id=\"btn-hint\" onclick=\"showHint()\">\ud83d\udca1 HINT</button>\n    </div>\n  </div>\n</div>\n<script>\nconst LEVELS = [\n` 5 5 50\n. . . . .\n. . G . .\n. . . # .\n. # . S .\nG S . . .\nW 0 2 0 3 0 4 1 4 0 4 0 3\nT 1 1 1 0 2 0 1 0`,\n`5 5 50\n. . . G .\n. . # . .\nS # G . .\n. . S . .\n. . . . .\nW 0 2 0 1 0 0 1 0 0 0 0 1\nW 0 4 1 4 1 3 1 4`,\n`5 5 50\n. . . . .\n. . . . .\nG S . . S\n. . . . .\n. G . # .\nW 4 2 3 2\nW 4 0 3 0 3 1 3 0`,\n`5 5 50\nS # . . .\n. . . . .\n# . G . G\n. . . . .\n. . S . .\nW 3 4 4 4\nW 3 2 3 1 3 0 3 1`,\n`5 5 50\n. . . . .\n. . . . .\n. . . . S\n. . . S G\n. G # . .\nW 4 4 4 3\nT 4 0 3 0`,\n`5 5 50\nG . . # .\n. . G # .\n. . S . .\n. . . . .\n. . S . .\nW 0 1 1 1 1 0 2 0 1 0 1 1\nW 1 4 2 4 3 4 2 4`,\n];\nconst SOLUTIONS=[['down','up','left','up','up'],['up','left','right','up','up'],['left','left','right','down','down'],['down','up','up','right','right'],['right','left','left','left','down'],['up','up','right','left','left']];\nlet hintStep=0,solutionStep=0,_ac;\nfunction getAC(){if(!_ac||_ac.state==='closed')_ac=new(window.AudioContext||window.webkitAudioContext)();if(_ac.state==='suspended')_ac.resume();return _ac;}\nfunction playTone(f1,f2,type,dur,vol){try{const ac=getAC(),t=ac.currentTime,o=ac.createOscillator(),g=ac.createGain();o.type=type||'sine';o.frequency.setValueAtTime(f1,t);if(f2)o.frequency.exponentialRampToValueAtTime(f2,t+dur);g.gain.setValueAtTime(vol||0.3,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);o.connect(g);g.connect(ac.destination);o.start(t);o.stop(t+dur);}catch(e){}}\nfunction playEat(){playTone(880,1400,'square',0.09,0.18);}\nfunction playDead(){playTone(440,60,'sawtooth',0.5,0.35);}\nfunction playWin(){[0,1,2,3].forEach(i=>setTimeout(()=>playTone(440*Math.pow(1.25,i),440*Math.pow(1.25,i)*1.5,'sine',0.18,0.25),i*120));}\n\nfunction parseLevel(txt){\n  const lines=txt.trim().split('\\n').map(l=>l.trim());\n  const[cols,rows]=lines[0].split(/\\s+/).filter(Boolean).map(Number);\n  const pacs=[],cherries=[],blocks=[],ghosts=[];\n  for(let r=0;r<rows;r++){const toks=(lines[r+1]||'').split(/\\s+/);for(let c=0;c<Math.min(toks.length,cols);c++){const s=toks[c];if(s==='S')pacs.push({x:c,y:r});else if(s==='G')cherries.push({x:c,y:r});else if(s==='#')blocks.push({x:c,y:r});}}\n  for(let i=rows+1;i<lines.length;i++){const parts=lines[i].split(/\\s+/);if(!parts[0].match(/^[WT]$/i))continue;const type=parts[0].toUpperCase();const path=[];for(let j=1;j+1<parts.length;j+=2)path.push({x:parseInt(parts[j+1]),y:parseInt(parts[j])});if(path.length>=1)ghosts.push({type,path,pathIdx:0,x:path[0].x,y:path[0].y});}\n  return{cols,rows,pacs,cherries,blocks,ghosts};\n}\n\nlet gs=null,undoStack=[],score=0,levelIdx=0,totalCherries=0;\nlet animating=false,animT=0,animStart=0;\nconst ANIM_MS=230;\nlet pendingDir=null;\n\nfunction loadLevel(idx){\n  const d=parseLevel(LEVELS[idx]);\n  gs={cols:d.cols,rows:d.rows,\n    pacs:d.pacs.map((p,i)=>({x:p.x,y:p.y,px:p.x,py:p.y,facing:'right',id:i})),\n    ghosts:d.ghosts.map(g=>({...g,px:g.x,py:g.y,pathIdx:0,x:g.path[0].x,y:g.path[0].y})),\n    cherries:d.cherries.map(c=>({...c})),blocks:d.blocks,dead:false,won:false,pendingEat:[]};\n  totalCherries=gs.cherries.length;\n  undoStack=[];animating=false;deathAnimating=false;deathPacs=[];pendingDir=null;\n  isUndoAnim=false;undoRestoreCherries=[];hintStep=0;solutionStep=0;_hintRewinding=false;clearHintArrow();\n  setupCanvas();updateCherryBar();updateHUD();\n}\nfunction snapshot(){return{pacs:gs.pacs.map(p=>({...p})),ghosts:gs.ghosts.map(g=>({...g,path:g.path})),cherries:gs.cherries.map(c=>({...c})),solutionStep};}\nfunction restoreSnap(snap){gs.pacs=snap.pacs.map(p=>({...p}));gs.ghosts=snap.ghosts.map(g=>({...g,path:g.path}));gs.cherries=snap.cherries.map(c=>({...c}));gs.dead=false;gs.won=false;gs.pendingEat=[];if(snap.solutionStep!==undefined)solutionStep=snap.solutionStep;updateCherryBar();}\n\nconst DX={right:1,left:-1,up:0,down:0},DY={right:0,left:0,up:-1,down:1};\nfunction blocked(x,y){if(x<0||x>=gs.cols||y<0||y>=gs.rows)return true;return gs.blocks.some(b=>b.x===x&&b.y===y);}\nfunction otherPacAt(x,y,id){return gs.pacs.some(p=>p.id!==id&&p.x===x&&p.y===y);}\nfunction ghostAt(x,y){return gs.ghosts.some(g=>g.x===x&&g.y===y);}\nfunction allCherriesEaten(){return gs.cherries.every(c=>gs.pendingEat.some(e=>e.x===c.x&&e.y===c.y));}\n\nfunction processTurn(dir){\n  if(_hintRewinding)return;\n  if(gs.dead||gs.won||animating){if(animating)pendingDir=dir;return;}\n  clearHintArrow();\n  clearTimeout(showHint._timer);\n  undoStack.push(snapshot());if(undoStack.length>30)undoStack.shift();\n  gs.pacs.forEach(p=>{p.px=p.x;p.py=p.y;p.facing=dir;});\n  gs.ghosts.forEach(g=>{g.px=g.x;g.py=g.y;});\n  const dx=DX[dir],dy=DY[dir];\n  gs.pendingEat=[];\n  gs.pacs.forEach(pac=>{\n    const nx=pac.x+dx,ny=pac.y+dy;\n    if(!blocked(nx,ny)&&!otherPacAt(nx,ny,pac.id)){pac.x=nx;pac.y=ny;}\n    const ci=gs.cherries.findIndex(c=>c.x===pac.x&&c.y===pac.y);\n    if(ci!==-1&&!gs.pendingEat.some(e=>e.x===pac.x&&e.y===pac.y))gs.pendingEat.push({x:pac.x,y:pac.y,eaten:false});\n  });\n  if(gs.pacs.some(p=>ghostAt(p.x,p.y))){if(allCherriesEaten()){gs.won=true;startAnim();return;}gs.dead=true;startAnim();return;}\n  for(const g of gs.ghosts){if(g.type!=='T')continue;const t=ghostLOS(g);if(t){g.chasing=true;g.chaseDir={dx:t.dx,dy:t.dy};g.x=t.pac.x;g.y=t.pac.y;if(allCherriesEaten()){gs.won=true;startAnim();return;}gs.dead=true;playDead();startAnim();return;}}\n  gs.ghosts.forEach(moveGhost);\n  if(gs.pacs.some(p=>ghostAt(p.x,p.y))){if(allCherriesEaten()){gs.won=true;startAnim();return;}gs.dead=true;playDead();startAnim();return;}\n  updateHUD();\n  // Track solution progress\n  const _sol=getSolution();\n  if(_sol[solutionStep]===dir) solutionStep=Math.min(solutionStep+1,_sol.length);\n  else solutionStep=0;\n  startAnim();\n}\n\nfunction commitPendingEats(){\n  if(!gs.pendingEat||!gs.pendingEat.length)return;\n  gs.pendingEat.forEach(e=>{const ci=gs.cherries.findIndex(c=>c.x===e.x&&c.y===e.y);if(ci!==-1){gs.cherries.splice(ci,1);score+=10;}});\n  updateCherryBar();updateHUD();gs.pendingEat=[];\n  if(gs.cherries.length===0&&!gs.dead)gs.won=true;\n}\n\nfunction ghostFacingDir(g){\n  if(g.path.length<=1)return null;\n  const curr=g.path[g.pathIdx],next=g.path[(g.pathIdx+1)%g.path.length];\n  const dx=Math.sign(next.x-curr.x),dy=Math.sign(next.y-curr.y);\n  if(dx===0&&dy===0)return null;return{dx,dy};\n}\nfunction ghostLOS(g){\n  if(g.type!=='T')return null;const dir=ghostFacingDir(g);if(!dir)return null;\n  let cx=g.x+dir.dx,cy=g.y+dir.dy;\n  while(cx>=0&&cx<gs.cols&&cy>=0&&cy<gs.rows){\n    if(gs.blocks.some(b=>b.x===cx&&b.y===cy))break;\n    const pac=gs.pacs.find(p=>p.x===cx&&p.y===cy);if(pac)return{pac,dx:dir.dx,dy:dir.dy};\n    cx+=dir.dx;cy+=dir.dy;\n  }return null;\n}\nfunction moveGhost(g){g.chasing=false;g.chaseDir=null;if(g.path.length<=1)return;g.pathIdx=(g.pathIdx+1)%g.path.length;g.x=g.path[g.pathIdx].x;g.y=g.path[g.pathIdx].y;}\n\n// \u2500\u2500 Animation\nlet isUndoAnim=false,undoRestoreCherries=[];\n\nfunction undoMove(){\n  if(!undoStack.length||animating||deathAnimating)return;\n  const fromPacs=gs.pacs.map(p=>({x:p.x,y:p.y}));\n  const fromGhosts=gs.ghosts.map(g=>({x:g.x,y:g.y}));\n  const snap=undoStack.pop();\n  undoRestoreCherries=snap.cherries.filter(sc=>!gs.cherries.some(c=>c.x===sc.x&&c.y===sc.y));\n  restoreSnap(snap);\n  gs.pacs.forEach((p,i)=>{p.px=fromPacs[i].x;p.py=fromPacs[i].y;});\n  gs.ghosts.forEach((g,i)=>{g.px=fromGhosts[i].x;g.py=fromGhosts[i].y;});\n  isUndoAnim=true;\n  try{const ac=getAC(),t=ac.currentTime,o=ac.createOscillator(),g=ac.createGain();o.type='sine';o.frequency.setValueAtTime(600,t);o.frequency.linearRampToValueAtTime(300,t+0.18);g.gain.setValueAtTime(0.18,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.22);o.connect(g);g.connect(ac.destination);o.start(t);o.stop(t+0.22);}catch(e){}\n  updateHUD();startAnim();\n}\nfunction startAnim(){animating=true;animT=0;animStart=performance.now();}\nfunction ease(t){return 1-Math.pow(1-t,3);}\nfunction easeInQuad(t){return t*t;}\nfunction easeOutCubic(t){return 1-Math.pow(1-t,3);}\n\nconst canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');\nconst DPR=window.devicePixelRatio||1;\nlet CELL=64;\nfunction setupCanvas(){if(!gs)return;const maxW=Math.min(window.innerWidth-20,window.innerHeight-160,640);CELL=Math.floor(maxW/gs.cols);const W=CELL*gs.cols,H=CELL*gs.rows;canvas.width=W*DPR;canvas.height=H*DPR;canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.setTransform(DPR,0,0,DPR,0,0);const cc=document.getElementById('cc');cc.width=W*DPR;cc.height=H*DPR;cc.style.width=W+'px';cc.style.height=H+'px';const hc=document.getElementById('hint-arrow');hc.width=W*DPR;hc.height=H*DPR;hc.style.width=W+'px';hc.style.height=H+'px';}\nfunction lerp(a,b,t){return a+(b-a)*t;}\n\nfunction drawGrid(){\n  const W=CELL*gs.cols,H=CELL*gs.rows;\n  ctx.fillStyle='#05050a';ctx.fillRect(0,0,W,H);\n  for(let c=0;c<gs.cols;c++)for(let r=0;r<gs.rows;r++){ctx.fillStyle=(c+r)%2===0?'rgba(0,229,255,.018)':'rgba(180,79,255,.014)';ctx.fillRect(c*CELL,r*CELL,CELL,CELL);}\n  ctx.strokeStyle='rgba(0,229,255,.07)';ctx.lineWidth=0.5;\n  for(let r=1;r<gs.rows;r++){ctx.beginPath();ctx.moveTo(0,r*CELL);ctx.lineTo(W,r*CELL);ctx.stroke();}\n  for(let c=1;c<gs.cols;c++){ctx.beginPath();ctx.moveTo(c*CELL,0);ctx.lineTo(c*CELL,H);ctx.stroke();}\n  ctx.strokeStyle='rgba(0,229,255,.22)';ctx.lineWidth=1.5;ctx.strokeRect(.75,.75,W-1.5,H-1.5);\n}\nfunction drawBlock(x,y){const px=x*CELL+3,py=y*CELL+3,s=CELL-6;ctx.fillStyle='#0e0a1a';ctx.fillRect(px,py,s,s);ctx.strokeStyle='#b44fff';ctx.lineWidth=1.5;ctx.strokeRect(px,py,s,s);const g=ctx.createRadialGradient(px+s/2,py+s/2,0,px+s/2,py+s/2,s*.7);g.addColorStop(0,'rgba(180,79,255,.18)');g.addColorStop(1,'rgba(180,79,255,0)');ctx.fillStyle=g;ctx.fillRect(px,py,s,s);ctx.strokeStyle='rgba(180,79,255,.7)';ctx.lineWidth=2;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(px+7,py+7);ctx.lineTo(px+s-7,py+s-7);ctx.moveTo(px+s-7,py+7);ctx.lineTo(px+7,py+s-7);ctx.stroke();ctx.lineCap='butt';}\nfunction drawCherry(x,y,now){const cx=x*CELL+CELL/2,cy=y*CELL+CELL/2,pulse=.85+.15*Math.sin(now*.0035+x*1.2+y*.9),r=CELL*.215*pulse;const grd=ctx.createRadialGradient(cx,cy,0,cx,cy,r*2.4);grd.addColorStop(0,'rgba(255,34,85,.28)');grd.addColorStop(1,'rgba(255,34,85,0)');ctx.fillStyle=grd;ctx.beginPath();ctx.arc(cx,cy,r*2.4,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#44cc22';ctx.lineWidth=1.5;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(cx,cy-r*.9);ctx.quadraticCurveTo(cx+r*.7,cy-r*1.8,cx+r*.4,cy-r*2.4);ctx.stroke();ctx.lineCap='butt';ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fillStyle='#ff2255';ctx.fill();ctx.strokeStyle='rgba(255,100,140,.5)';ctx.lineWidth=1;ctx.stroke();ctx.beginPath();ctx.arc(cx-r*.33,cy-r*.33,r*.3,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,.52)';ctx.fill();}\n\nfunction drawGhostSightBeam(g,et,now){\n  if(g.type!=='T')return;\n  let bfx,bfy,btx,bty;\n  if(g.chasing){bfx=lerp(g.px,g.x,et)*CELL+CELL/2;bfy=lerp(g.py,g.y,et)*CELL+CELL/2;btx=g.x*CELL+CELL/2;bty=g.y*CELL+CELL/2;}\n  else{const t=ghostLOS(g);if(!t)return;bfx=g.x*CELL+CELL/2;bfy=g.y*CELL+CELL/2;btx=t.pac.x*CELL+CELL/2;bty=t.pac.y*CELL+CELL/2;}\n  const pulse=0.4+0.35*Math.sin(now*0.008),alpha=g.chasing?0.85:pulse*0.55;\n  ctx.save();const grad=ctx.createLinearGradient(bfx,bfy,btx,bty);grad.addColorStop(0,`rgba(255,60,60,${alpha})`);grad.addColorStop(0.6,`rgba(255,120,30,${alpha*0.6})`);grad.addColorStop(1,`rgba(255,60,60,0.04)`);\n  ctx.strokeStyle=grad;ctx.lineWidth=g.chasing?CELL*0.18:CELL*0.10;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(bfx,bfy);ctx.lineTo(btx,bty);ctx.stroke();\n  ctx.shadowColor='#ff3300';ctx.shadowBlur=g.chasing?22:10;ctx.lineWidth=2;ctx.strokeStyle=`rgba(255,80,30,${alpha})`;ctx.beginPath();ctx.moveTo(bfx,bfy);ctx.lineTo(btx,bty);ctx.stroke();ctx.shadowBlur=0;ctx.lineCap='butt';ctx.restore();\n}\n\nfunction drawGhost(vx,vy,type,now,chasing){\n  const cx=vx*CELL+CELL/2,cy=vy*CELL+CELL/2,r=CELL*.36,col=type==='T'?'#ff3333':'#33aaff',wob=.5+.5*Math.sin(now*.003+(type==='W'?Math.PI:0));\n  ctx.save();\n  if(chasing){ctx.shadowColor='#ff2200';ctx.shadowBlur=20+10*wob;}else{ctx.shadowColor=col;ctx.shadowBlur=12+6*wob;}\n  ctx.beginPath();ctx.arc(cx,cy-r*.12,r,Math.PI,0,false);\n  const botY=cy+r*.78,bH=r*.38,bW=(r*2)/3;\n  // Legs wiggle: each of the 3 bumps has its own phase\n  const spd = chasing ? 0.012 : 0.005; // wiggle faster when chasing\n  const w0=bH*(0.7+0.3*Math.sin(now*spd+(type==='W'?0:1.1)));\n  const w1=bH*(0.7+0.3*Math.sin(now*spd+2.1+(type==='W'?0:1.1)));\n  const w2=bH*(0.7+0.3*Math.sin(now*spd+4.2+(type==='W'?0:1.1)));\n  ctx.lineTo(cx+r,botY);\n  ctx.quadraticCurveTo(cx+r-bW*.5,  botY+w0, cx+r-bW,   botY);\n  ctx.quadraticCurveTo(cx+r-bW*1.5, botY+w1, cx+r-bW*2, botY);\n  ctx.quadraticCurveTo(cx+r-bW*2.5, botY+w2, cx-r,      botY);\n  ctx.lineTo(cx-r,cy-r*.12);ctx.closePath();ctx.fillStyle=col;ctx.fill();ctx.shadowBlur=0;\n  if(chasing){\n    [-0.3,0.3].forEach((ex,i)=>{\n      const eyeCX=cx+ex*r,eyeCY=cy-r*.05;\n      ctx.beginPath();ctx.ellipse(eyeCX,eyeCY,r*.22,r*.27,0,0,Math.PI*2);ctx.fillStyle='white';ctx.fill();\n      ctx.beginPath();ctx.ellipse(eyeCX+(i===0?r*.06:-r*.06),eyeCY+r*.03,r*.13,r*.16,0,0,Math.PI*2);\n      ctx.fillStyle='#ff1100';ctx.shadowColor='#ff3300';ctx.shadowBlur=8;ctx.fill();ctx.shadowBlur=0;\n      const ba=i===0?-0.4:0.4;\n      ctx.strokeStyle='rgba(200,0,0,.9)';ctx.lineWidth=1.8;ctx.lineCap='round';\n      ctx.beginPath();ctx.moveTo(eyeCX-r*.2*Math.cos(ba)-r*.08,eyeCY-r*.32-r*.08*Math.sin(ba));\n      ctx.lineTo(eyeCX+r*.2*Math.cos(ba)+r*.08,eyeCY-r*.32+r*.08*Math.sin(ba));\n      ctx.stroke();ctx.lineCap='butt';\n    });\n  } else {\n    // Pupils track nearest pac\n    let lookDx=0,lookDy=0;\n    if(gs&&gs.pacs.length){\n      let best=null,bd=9999;\n      gs.pacs.forEach(p=>{const d=Math.hypot(p.x-vx,p.y-vy);if(d<bd){bd=d;best=p;}});\n      if(best){const dx=best.x-vx,dy=best.y-vy,len=Math.hypot(dx,dy)||1;lookDx=dx/len;lookDy=dy/len;}\n    } else {\n      lookDx=Math.sin(now*0.0007);lookDy=Math.cos(now*0.0005);\n    }\n    // Blink every ~4s, offset by type\n    const blinkT=(now/1000+(type==='W'?0:2.0))%4.0;\n    const scaleY=blinkT>3.82?0.07:1;\n    [-0.3,0.3].forEach(ex=>{\n      const eyeCX=cx+ex*r,eyeCY=cy-r*.05;\n      ctx.save();\n      ctx.translate(eyeCX,eyeCY);ctx.scale(1,scaleY);ctx.translate(-eyeCX,-eyeCY);\n      ctx.beginPath();ctx.ellipse(eyeCX,eyeCY,r*.22,r*.27,0,0,Math.PI*2);ctx.fillStyle='white';ctx.fill();\n      const maxShift=r*0.08;\n      const px=eyeCX+lookDx*maxShift,py=eyeCY+lookDy*maxShift;\n      ctx.beginPath();ctx.ellipse(px,py,r*.12,r*.15,0,0,Math.PI*2);\n      ctx.fillStyle=type==='T'?'#440000':'#001a33';ctx.fill();\n      // Tiny shine\n      ctx.beginPath();ctx.arc(px-r*.05,py-r*.07,r*.05,0,Math.PI*2);\n      ctx.fillStyle='rgba(255,255,255,.6)';ctx.fill();\n      ctx.restore();\n    });\n  }\n  ctx.restore();\n}\n\n// \u2500\u2500 drawPac: EVERYTHING drawn inside save/translate/rotate/restore\n// Eye local coords are chosen so that after ctx.rotate(angle) they\n// land in the correct screen quadrant.\n//\n// Rotation math: screen = rotate(local, angle)\n//   screenX = lx*cos(a) - ly*sin(a)\n//   screenY = lx*sin(a) + ly*cos(a)\n//\n// We want the eye to appear in the \"upper\" area on the OPPOSITE side\n// from the mouth gap. The mouth gap is at local angle 0 (rightward).\n// Eye should be at local upper-right: lx=+0.28, ly=-0.40.\n//\n// Check each direction:\n//   right (a=0):   sx=+0.28, sy=-0.40  \u2192 upper-right  \u2713\n//   left  (a=\u03c0):   sx=-0.28, sy=+0.40  \u2192 LOWER-LEFT   \u2717 need to flip ly\n//   up    (a=-\u03c0/2): sx=-0.40, sy=-0.28 \u2192 upper-left   \u2713 (rotated body)\n//   down  (a=+\u03c0/2): sx=+0.40, sy=+0.28 \u2192 lower-right  \u2717 need to flip ly\n//\n// Fix: per-direction local eye coords:\n//   right: (+0.28, -0.40)  \u2192 screen (+0.28r, -0.40r) upper-right\n//   left:  (+0.28, +0.40)  \u2192 screen (-0.28r, -0.40r) upper-left  \u2713\n//   up:    (+0.28, -0.40)  \u2192 screen (-0.40r, +0.28r) lower-right of rotated body... \n//          Actually for up: body rotated -90\u00b0, mouth points up.\n//          We want eye visible near top of the circle but not in mouth gap.\n//          upper-right of screen = local (+0.40, +0.28) for up (a=-\u03c0/2)\n//          screenX = 0.40*cos(-\u03c0/2) - 0.28*sin(-\u03c0/2) = 0 + 0.28 = +0.28r... hmm\n//   \n// Simplest correct approach: just use screen-space directly, bypassing rotate for eye only.\n// Draw body in rotated frame, then restore and draw eye in screen space.\n\nfunction drawPac(vx,vy,facing,animT,id){\n  const cx=vx*CELL+CELL/2,cy=vy*CELL+CELL/2,r=CELL*.39,col=id===0?'#FFD700':'#FFB800';\n  const fA={right:0,left:Math.PI,up:-Math.PI/2,down:Math.PI/2};\n  const angle=fA[facing]||0;\n\n  // Glow\n  const grd=ctx.createRadialGradient(cx,cy,0,cx,cy,r*1.65);\n  grd.addColorStop(0,'rgba(255,215,0,.22)');grd.addColorStop(1,'rgba(255,215,0,0)');\n  ctx.fillStyle=grd;ctx.beginPath();ctx.arc(cx,cy,r*1.65,0,Math.PI*2);ctx.fill();\n\n  // Body\n  const maxMouth=.24*Math.PI,mouth=maxMouth*Math.abs(Math.sin(animT*Math.PI));\n  ctx.save();\n  ctx.translate(cx,cy);ctx.rotate(angle);\n  ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,r,mouth,Math.PI*2-mouth);ctx.closePath();\n  ctx.fillStyle=col;ctx.shadowColor='#ffcc00';ctx.shadowBlur=14;ctx.fill();ctx.shadowBlur=0;\n  ctx.restore();\n\n  // Eye \u2014 blink every ~3s, pupil darts subtly\n  const now=performance.now();\n  const blinkCycle=(now/1000+id*1.7)%3.2; // offset per pac\n  const blinking=blinkCycle>3.0; // blink lasts ~0.2s\n  if(!blinking){\n    const eyeX={right:cx+r*0.30,left:cx-r*0.30,up:cx+r*0.40,down:cx+r*0.40}[facing]??cx+r*0.30;\n    const eyeY={right:cy-r*0.38,left:cy-r*0.38,up:cy-r*0.10,down:cy+r*0.10}[facing]??cy-r*0.38;\n    const eyeR=r*0.11;\n    // White sclera\n    ctx.beginPath();ctx.arc(eyeX,eyeY,eyeR,0,Math.PI*2);\n    ctx.fillStyle='rgba(255,255,255,.85)';ctx.fill();\n    // Pupil darts: small slow oscillation\n    const dartX=eyeR*0.28*Math.sin(now*0.0008+id*2.1);\n    const dartY=eyeR*0.20*Math.sin(now*0.0006+id*1.3);\n    ctx.beginPath();ctx.arc(eyeX+dartX,eyeY+dartY,eyeR*0.55,0,Math.PI*2);\n    ctx.fillStyle='rgba(0,0,0,.9)';ctx.fill();\n    // Tiny shine\n    ctx.beginPath();ctx.arc(eyeX+dartX-eyeR*.22,eyeY+dartY-eyeR*.22,eyeR*.22,0,Math.PI*2);\n    ctx.fillStyle='rgba(255,255,255,.7)';ctx.fill();\n  }\n}\n\n// \u2500\u2500 Death animation\nlet deathAnimating=false,deathAnimStart=0;\nconst DEATH_ANIM_MS=900;\nlet deathPacs=[];\n\nfunction playDeathSound(){try{const ac=getAC(),t=ac.currentTime,o=ac.createOscillator(),g=ac.createGain();o.type='sawtooth';o.frequency.setValueAtTime(600,t);o.frequency.exponentialRampToValueAtTime(40,t+0.85);g.gain.setValueAtTime(0.0,t);g.gain.linearRampToValueAtTime(0.4,t+0.05);g.gain.exponentialRampToValueAtTime(0.001,t+0.9);o.connect(g);g.connect(ac.destination);o.start(t);o.stop(t+0.9);const o2=ac.createOscillator(),g2=ac.createGain();o2.type='square';o2.frequency.setValueAtTime(1200,t);o2.frequency.exponentialRampToValueAtTime(80,t+0.55);g2.gain.setValueAtTime(0.18,t);g2.gain.exponentialRampToValueAtTime(0.001,t+0.55);o2.connect(g2);g2.connect(ac.destination);o2.start(t);o2.stop(t+0.55);}catch(e){}}\nfunction startDeathAnim(){deathPacs=gs.pacs.map(p=>({x:p.x,y:p.y,facing:p.facing,id:p.id}));deathAnimating=true;deathAnimStart=performance.now();playDeathSound();}\n\nfunction drawPacDying(vx,vy,facing,t,id){\n  const cx=vx*CELL+CELL/2,cy=vy*CELL+CELL/2;\n  const fA={right:0,left:Math.PI,up:-Math.PI/2,down:Math.PI/2};\n  const a=fA[facing]||0;\n  const openPhase=Math.min(1,t/0.72),shrinkPhase=Math.max(0,(t-0.72)/0.28);\n  const mouthGap=lerp(0.24*Math.PI,Math.PI*0.98,easeInQuad(openPhase));\n  const scale=1-easeInQuad(shrinkPhase)*0.95,r=CELL*0.39*scale;\n  if(r<1)return;\n  const rc=Math.round(lerp(255,180,Math.min(1,t*1.4))),gc=Math.round(lerp(215,0,Math.min(1,t*1.2)));\n  if(t<0.18){const ft=t/0.18,fr=CELL*0.5*(0.5+ft*1.2);const grd=ctx.createRadialGradient(cx,cy,0,cx,cy,fr);grd.addColorStop(0,`rgba(255,80,0,${0.6*(1-ft)})`);grd.addColorStop(0.5,`rgba(255,200,0,${0.3*(1-ft)})`);grd.addColorStop(1,'rgba(255,0,0,0)');ctx.fillStyle=grd;ctx.beginPath();ctx.arc(cx,cy,fr,0,Math.PI*2);ctx.fill();}\n  const ga=(1-t)*0.28;if(ga>0.01){const grd2=ctx.createRadialGradient(cx,cy,0,cx,cy,r*1.7);grd2.addColorStop(0,`rgba(255,80,0,${ga*2})`);grd2.addColorStop(1,'rgba(255,0,0,0)');ctx.fillStyle=grd2;ctx.beginPath();ctx.arc(cx,cy,r*1.7,0,Math.PI*2);ctx.fill();}\n  const spin=openPhase*Math.PI*0.55,arcA=a+spin;\n  ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,arcA+mouthGap,arcA+Math.PI*2-mouthGap);ctx.closePath();ctx.fillStyle=`rgb(${rc},${gc},0)`;ctx.shadowColor='#ff4400';ctx.shadowBlur=(1-t)*18;ctx.fill();ctx.shadowBlur=0;\n  if(t<0.35){\n    const ea=1-t/0.35;\n    // Eye in screen space matching drawPac\n    const eyeX={right:cx+r*0.30,left:cx-r*0.30,up:cx+r*0.40,down:cx+r*0.40}[facing]??cx+r*0.30;\n    const eyeY={right:cy-r*0.38,left:cy-r*0.38,up:cy-r*0.10,down:cy+r*0.10}[facing]??cy-r*0.38;\n    ctx.globalAlpha=ea;ctx.beginPath();ctx.arc(eyeX,eyeY,r*0.11,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,.88)';ctx.fill();ctx.globalAlpha=1;\n  }\n  if(t>0.15&&t<0.85){const st=(t-0.15)/0.7;for(let i=0;i<10;i++){const ang=(i/10)*Math.PI*2+t*2.8+id*1.1,dist=CELL*0.62*easeOutCubic(st),sx=cx+Math.cos(ang)*dist,sy=cy+Math.sin(ang)*dist,sr=Math.max(0,CELL*0.065*(1-st)),al=Math.max(0,1-st*1.25),sg=Math.round(lerp(180,0,st));ctx.beginPath();ctx.arc(sx,sy,sr,0,Math.PI*2);ctx.fillStyle=`rgba(255,${sg},0,${al})`;ctx.fill();}}\n}\n\nfunction drawCherryEating(cx,cy,ep){const sc=Math.max(0,1-ep),r=CELL*.215*sc;if(r<0.5)return;ctx.save();ctx.translate(cx,cy);const fa=Math.max(0,1-ep*1.5);if(ep<0.6){const br=CELL*.3*(1+ep*2.2);const grd=ctx.createRadialGradient(0,0,0,0,0,br);grd.addColorStop(0,`rgba(255,80,120,${0.5*(1-ep*1.6)})`);grd.addColorStop(0.4,`rgba(255,220,0,${0.3*(1-ep*1.6)})`);grd.addColorStop(1,'rgba(255,0,80,0)');ctx.fillStyle=grd;ctx.beginPath();ctx.arc(0,0,br,0,Math.PI*2);ctx.fill();}if(ep<0.4){ctx.globalAlpha=1-ep*2.5;ctx.strokeStyle='#44cc22';ctx.lineWidth=1.5;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(0,-r*.9);ctx.quadraticCurveTo(r*.7,-r*1.8,r*.4,-r*2.4);ctx.stroke();ctx.lineCap='butt';ctx.globalAlpha=1;}const sx=1+ep*0.4,sy=1-ep*0.3;ctx.scale(sx,sy);ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fillStyle='#ff2255';ctx.fill();if(fa>0){ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${fa*0.85})`;ctx.fill();}ctx.beginPath();ctx.arc(-r*.33,-r*.33,r*.3,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${0.52*(1-ep)})`;ctx.fill();if(ep>0.1){const sc2=['#FFD700','#ff2255','#ffffff','#ff8833'];for(let i=0;i<6;i++){const a=(i/6)*Math.PI*2+ep,d=CELL*.38*ep,sx2=Math.cos(a)*d/sx,sy2=Math.sin(a)*d/sy,sr=Math.max(0,CELL*.055*(1-ep));ctx.beginPath();ctx.arc(sx2,sy2,sr,0,Math.PI*2);ctx.fillStyle=sc2[i%sc2.length];ctx.globalAlpha=Math.max(0,1-ep*1.3);ctx.fill();ctx.globalAlpha=1;}}ctx.restore();}\n\nfunction draw(t,now){\n  if(!gs)return;\n  const et=isUndoAnim?easeInQuad(t):ease(t);\n  ctx.clearRect(0,0,canvas.width/DPR,canvas.height/DPR);drawGrid();\n  if(isUndoAnim){ctx.fillStyle=`rgba(160,80,255,${0.13*Math.sin(t*Math.PI)})`;ctx.fillRect(0,0,canvas.width/DPR,canvas.height/DPR);}\n  gs.blocks.forEach(b=>drawBlock(b.x,b.y));\n  const eSet=new Set((gs.pendingEat||[]).map(e=>`${e.x},${e.y}`));\n  gs.cherries.forEach(c=>{\n    const isR=isUndoAnim&&undoRestoreCherries.some(rc=>rc.x===c.x&&rc.y===c.y);\n    if(isR){const at=Math.max(0,(t-0.45)/0.55),sc=ease(at);if(sc<=0)return;const cx=c.x*CELL+CELL/2,cy=c.y*CELL+CELL/2;ctx.save();ctx.translate(cx,cy);ctx.scale(sc,sc);ctx.translate(-cx,-cy);ctx.globalAlpha=at;drawCherry(c.x,c.y,now);ctx.globalAlpha=1;ctx.restore();}\n    else if(!eSet.has(`${c.x},${c.y}`))drawCherry(c.x,c.y,now);\n  });\n  if(!isUndoAnim&&gs.pendingEat&&gs.pendingEat.length&&t>0){const ES=0.45;gs.pendingEat.forEach(e=>{const cx=e.x*CELL+CELL/2,cy=e.y*CELL+CELL/2;if(et<ES)drawCherry(e.x,e.y,now);else{const ep=Math.min(1,(et-ES)/(1-ES));if(!e.eaten){e.eaten=true;playEat();}drawCherryEating(cx,cy,ep);}});}\n  gs.ghosts.forEach(g=>drawGhostTrail(g));\n  gs.ghosts.forEach(g=>{if(g.type==='T')drawGhostSightBeam(g,et,now);});\n  gs.ghosts.forEach(g=>drawGhost(lerp(g.px,g.x,et),lerp(g.py,g.y,et),g.type,now,g.chasing));\n  if(deathAnimating){const dt=Math.min((performance.now()-deathAnimStart)/DEATH_ANIM_MS,1);deathPacs.forEach(p=>drawPacDying(p.x,p.y,p.facing,dt,p.id));}\n  else{gs.pacs.forEach(p=>{let f=p.facing;if(isUndoAnim){const dx=p.x-p.px,dy=p.y-p.py;if(dx>0)f='right';else if(dx<0)f='left';else if(dy>0)f='down';else if(dy<0)f='up';}drawPac(lerp(p.px,p.x,et),lerp(p.py,p.y,et),f,t,p.id);});}\n}\n\nfunction drawGhostTrail(g){if(g.path.length<2)return;const col=g.type==='T'?'rgba(255,50,50,.35)':'rgba(51,170,255,.32)';ctx.save();ctx.strokeStyle=col;ctx.lineWidth=2;ctx.lineCap='round';ctx.lineJoin='round';ctx.setLineDash([CELL*0.12,CELL*0.18]);ctx.beginPath();g.path.forEach((pt,i)=>{const px=pt.x*CELL+CELL/2,py=pt.y*CELL+CELL/2;if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);});ctx.lineTo(g.path[0].x*CELL+CELL/2,g.path[0].y*CELL+CELL/2);ctx.stroke();ctx.setLineDash([]);ctx.lineWidth=1.5;g.path.forEach(pt=>{ctx.beginPath();ctx.arc(pt.x*CELL+CELL/2,pt.y*CELL+CELL/2,CELL*0.07,0,Math.PI*2);ctx.fillStyle=col;ctx.fill();});ctx.lineCap='butt';ctx.restore();}\n\nfunction getSolution(){return SOLUTIONS[levelIdx]||[];}\n\nlet _hintRewinding=false;\n\n// Chain undos one-by-one until back on the solution path, then show arrow\nfunction hintRewind(){\n  const sol=getSolution();\n  if(solutionStep>0||undoStack.length===0){\n    _hintRewinding=false;\n    pendingDir=null; // discard any queued input from during rewind\n    if(solutionStep<sol.length) drawHintArrow(sol[solutionStep]);\n    clearTimeout(showHint._arrowTimer);\n    showHint._arrowTimer=setTimeout(clearHintArrow,1800);\n    return;\n  }\n  undoMove();\n  clearTimeout(showHint._timer);\n  showHint._timer=setTimeout(hintRewind, ANIM_MS+30);\n}\n\nfunction showHint(){\n  const sol=getSolution();\n  if(!sol.length)return;\n  if(animating||deathAnimating)return;\n\n  if(solutionStep===0&&undoStack.length>0){\n    clearTimeout(showHint._timer);\n    clearTimeout(showHint._arrowTimer);\n    pendingDir=null;\n    _hintRewinding=true;\n    hintRewind();\n    return;\n  }\n\n  if(solutionStep>=sol.length)return;\n  drawHintArrow(sol[solutionStep]);\n  clearTimeout(showHint._timer);\n  showHint._timer=setTimeout(clearHintArrow,1800);\n}\nfunction drawHintArrow(dir){\n  const hc=document.getElementById('hint-arrow');\n  if(!hc||!gs)return;\n  const hx=hc.getContext('2d');\n  hx.clearRect(0,0,hc.width,hc.height);\n  const dm={up:[0,-1],down:[0,1],left:[-1,0],right:[1,0]};\n  const[ddx,ddy]=dm[dir]||[0,0];\n  const aa=Math.atan2(ddy,ddx);\n  const startTime=performance.now();\n\n  function pulse(){\n    // Stop if arrow was cleared or overlay changed\n    if(!document.getElementById('hint-arrow').width) return;\n    hx.clearRect(0,0,hc.width,hc.height);\n    const t=(performance.now()-startTime)/1000;\n    const glow=0.55+0.45*Math.sin(t*5); // fast pulse\n\n    gs.pacs.forEach(p=>{\n      const cx=p.x*CELL+CELL/2, cy=p.y*CELL+CELL/2;\n      const tx=cx+ddx*CELL*0.72, ty=cy+ddy*CELL*0.72;\n      hx.save();\n      hx.translate(tx,ty);\n      hx.rotate(aa);\n      const len=CELL*0.38, hw=CELL*0.14;\n\n      // Arrow outline path\n      hx.beginPath();\n      hx.moveTo(len*0.5,0);\n      hx.lineTo(-len*0.3, hw*0.75);\n      hx.lineTo(-len*0.05, hw*0.35);\n      hx.lineTo(-len*0.5, hw*0.35);\n      hx.lineTo(-len*0.5,-hw*0.35);\n      hx.lineTo(-len*0.05,-hw*0. .style.visibility='visible';document.getElementById('controls').style.visibility='visible';}\nfunction nextLevel(){hideOv('ov-win');levelIdx++;loadLevel(levelIdx);}\nfunction retryLevel(){hideOv('ov-dead');hideOv('ov-win');const ate=totalCherries-gs.cherries.length;score=Math.max(0,score-ate*10);loadLevel(levelIdx);}\nfunction restartAll(){hideOv('ov-done');score=0;levelIdx=0;loadLevel(0);updateHUD();}\nfunction inp(dir){getAC();processTurn(dir);}\nfunction updateHUD(){document.getElementById('score-disp').textContent=score;document.getElementById('level-disp').textContent=levelIdx+1;}\nfunction updateCherryBar(){const bar=document.getElementById('cherry-bar');bar.innerHTML='';for(let i=0;i<totalCherries;i++){const d=document.createElement('div');d.className='c-dot'+(i>=gs.cherries.length?' eaten':'');bar.appendChild(d);}}\n\ndocument.addEventListener('keydown',e=>{if(e.repeat)return;const map={ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down',a:'left',d:'right',w:'up',s:'down'};if(map[e.key]){e.preventDefault();inp(map[e.key]);}if(e.key==='z'||e.key==='Z')undoMove();if(e.key==='r'||e.key==='R')retryLevel();if(e.key==='Enter'){if(document.getElementById('ov-start').classList.contains('show'))startGame();else if(document.getElementById('ov-win').classList.contains('show'))nextLevel();else if(document.getElementById('ov-dead').classList.contains('show'))retryLevel();else if(document.getElementById('ov-done').classList.contains('show'))restartAll();}});\nlet _tx0=0,_ty0=0,_lastSwipeTime=0;\ndocument.getElementById('field-wrap').addEventListener('pointerdown',e=>{_tx0=e.clientX;_ty0=e.clientY;});\ndocument.getElementById('field-wrap').addEventListener('pointerup',e=>{const _n=performance.now();if(_n-_lastSwipeTime<ANIM_MS)return;const dx=e.clientX-_tx0,dy=e.clientY-_ty0;if(Math.abs(dx)<8&&Math.abs(dy)<8)return;_lastSwipeTime=_n;if(Math.abs(dx)>Math.abs(dy))inp(dx>0?'right':'left');else inp(dy>0?'down':'up');});\n\nconst CONF_COLS=['#FFD700','#ff2255','#0 \n    var x=30+_rng()*(W-80), y=30+_rng()*(H-80);\n    var dx=((_rng()>0.5?1:-1)*(20+_rng()*50))|0;\n    var dy=((_rng()>0.5?1:-1)*(20+_rng()*50))|0;\n    var w=0.9+_rng()*0.8;\n    t.push({x0:x,y0:y,x1:x+dx,y1:y,w:w,layer:0});\n    t.push({x0:x+dx,y0:y,x1:x+dx,y1:y+dy,w:w,layer:0});\n  }\n  return t;\n})();\n\n// Ground pour polygons with irregular shapes\nconst GND_POURS=(function(){\n  var p=[];\n  var regions=[\n    {cx:0.1,cy:0.1,rx:0.18,ry:0.12},\n    {cx:0.88,cy:0.12,rx:0.14,ry:0.18},\n    {cx:0.08,cy:0.88,rx:0.16,ry:0.14},\n    {cx:0.9,cy:0.85,rx:0.13,ry:0.18},\n    {cx:0.5,cy:0.05,rx:0.22,ry:0.08},\n    {cx:0.5,cy:0.95,rx:0.18,ry:0.07},\n    {cx:0.05,cy:0.5,rx:0.07,ry:0.2},\n    {cx:0.95,cy:0.5,rx:0.07,ry:0.18},\n  ];\n  regions.forEach(function(r){\n    // Generate irregular polygon points\n    var pts=[],n=6+Math.floor(_rng()*5);\n    for(var i=0;i<n;i++){\n      var a=(i/n)*Math.PI*2;\n      var rx=r.rx*(0.7+_rng()*0.5)*CW;\n      var ry=r.ry*(0.7+_rng()*0.5)*CH;\n      pts.push({x:r.cx*CW+Math.cos(a)*rx,y:r.cy*CH+Math.sin(a)*ry});\n    }\n    p.push(pts);\n  });\n  return p;\n})();\n\n// Silkscreen: component outlines + ref designators\nconst SILK_ITEMS=(function(){\n  var items=[];\n  var refs=['R1','R2','R3','C1','C2','D1','L1','Q1','U5','J1','SW1','TP1','TP2'];\n  for(var i=0;i<22;i++){\n    var x=15+_rng()*(CW-80), y=15+_rng()*(CH-50);\n    var t=_rng();\n    if(t>0.65){\n      // Rectangular component outline\n      items.push({type:'rect',x:x,y:y,w:12+_rng()*40,h:8+_rng()*25});\n    } else if(t>0.3){\n      // Reference designator text\n      items.push({type:'text',x:x,y:y,label:refs[Math.floor(_rng()*refs.length)]});\n    } else {\n      // Circular component (cap, crystal)\n      items.push({type:'circle',x:x+10,y:y+10,r:5+_rng()*12});\n    }\n  }\n  // Pin 1 triangles\n  for(var i=0;i<8;i++){\n    items.push({type:'tri',x:20+_rng()*(CW-40),y:20+_rng()*(CH-40)});\n  }\n  // Plus/minus polarity marks\n  for(var i=0;i<6;i++){\n    items.push({type:'polar',x:20+_rng()*(CW-40),y:20+_rng()*(CH-40)});\n  }\n  return items;\n})();\n\n// Mounting holes\nconst MNT_HOLES=[{x:14,y:14},{x:CW-14,y:14},{x:14,y:CH-14},{x:CW-14,y:CH-14}];\nconst FIDUC=[{x:22,y:22},{x:CW-22,y:22},{x:22,y:CH-22},{x:CW-22,y:CH-22}];\n\n// \u2500\u2500 Pre-render offscreen for performance \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nvar _pcbCanvas=null;\n\nfunction buildPCBCanvas(){\n  var oc=document.createElement('canvas');\n  oc.width=CW;oc.height=CH;\n  var c=oc.getContext('2d');\n\n  // \u2500\u2500 1. FR4 substrate base \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  // Deep green solder mask with slight blue tint\n  var subG=c.createRadialGradient(CW*0.35,CH*0.3,10,CW*0.55,CH*0.5,CW*0.9);\n  subG.addColorStop(0,'#142d18');\n  subG.addColorStop(0.4,'#0e2112');\n  subG.addColorStop(0.75,'#0a1a0e');\n  subG.addColorStop(1,'#07120a');\n  c.fillStyle=subG;c.fillRect(0,0,CW,CH);\n\n  // \u2500\u2500 2. FR4 fiber-weave texture \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  // The characteristic diagonal crosshatch of glass fibers visible\n  // through the translucent solder mask\n  c.globalAlpha=0.028;\n  c.strokeStyle='#4a8a50';c.lineWidth=0.8;\n  var fiberSpacing=7;\n  for(var i=-CH;i<CW+CH;i+=fiberSpacing){\n    c.beginPath();c.moveTo(i,0);c.lineTo(i+CH,CH);c.stroke();\n  }\n  for(var i=-CH;i<CW+CH;i+=fiberSpacing){\n    c.beginPath();c.moveTo(i,0);c.lineTo(i-CH,CH);c.stroke();\n  }\n  // Warp fibers (horizontal)\n  c.globalAlpha=0.018;\n  c.lineWidth=0.6;\n  for(var y=0;y<CH;y+=fiberSpacing){\n    c.beginPath();c.moveTo(0,y);c.lineTo(CW,y);c.stroke();\n  }\n  // Weft fibers (vertical)\n  for(var x=0;x<CW;x+=fiberSpacing){\n    c.beginPath();c.moveTo(x,0);c.lineTo(x,CH);c.stroke();\n  }\n  c.globalAlpha=1;\n\n  // \u2500\u2500 3. Inner copper layer bleed \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  // Faint warm copper tint where inner layer copper is dense\n  c.globalAlpha=0.06;\n  var innerG=c.createRadialGradient(CW*0.6,CH*0.4,20,CW*0.5,CH*0.5,CW*0.6);\n  innerG.addColorStop(0,'rgba(180,100,30,0.8)');\n  innerG.addColorStop(0.5,'rgba(140,80,20,0.4)');\n  innerG.addColorStop(1,'rgba(80,40,10,0)');\n  c.fillStyle=innerG;c.fillRect(0,0,CW,CH);\n  c.globalAlpha=1;\n\n  // \u2500\u2500 4. Ground pour polygons \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  GND_POURS.forEach(function(pts){\n    // Copper pour base\n    c.beginPath();c.moveTo(pts[0].x,pts[0].y);\n    pts.forEach(function(p){c.lineTo(p.x,p.y);});c.closePath();\n    c.fillStyle='rgba(140,80,25,0.22)';c.fill();\n    // Hatching inside pour (angled lines = copper fill)\n    c.save();c.clip();\n    c.strokeStyle='rgba(160,90,30,0.18)';c.lineWidth=1.2;\n    for(var i=-200;i<CW+CH;i+=6){\n      c.beginPath();c.moveTo(i,0);c.lineTo(i+CH,CH);c.stroke();\n    }\n    c.restore();\n    // Pour edge\n    c.beginPath();c.moveTo(pts[0].x,pts[0].y);\n    pts.forEach(function(p){c.lineTo(p.x,p.y);});c.closePath();\n    c.strokeStyle='rgba(180,100,35,0.35)';c.lineWidth=1.5;c.stroke();\n  });\n\n  // \u2500\u2500 5. Copper trace network \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  // Layer 0 = top (copper under mask, dark warm brown)\n  // Layer 1 = inner layer (even darker, barely visible)\n  BG_TRACES.forEach(function(t){\n    var alpha=t.layer===0?0.28:0.11;\n    var col=t.layer===0?'rgba(160,90,30,1)':'rgba(120,70,20,1)';\n    c.globalAlpha=alpha;\n    // Trace shadow (depth)\n    c.strokeStyle='rgba(0,0,0,0.5)';\n    c.lineWidth=t.w+1;c.lineCap='square';\n    c.beginPath();c.moveTo(t.x0+0.5,t.y0+0.8);c.lineTo(t.x1+0.5,t.y1+0.8);c.stroke();\n    // Trace body\n    c.strokeStyle=col;c.lineWidth=t.w;\n    c.beginPath();c.moveTo(t.x0,t.y0);c.lineTo(t.x1,t.y1);c.stroke();\n    // Trace top sheen\n    if(t.layer===0 && t.w>1.2){\n      c.strokeStyle='rgba(220,140,60,0.25)';c.lineWidth=t.w*0.35;\n      c.beginPath();c.moveTo(t.x0,t.y0);c.lineTo(t.x1,t.y1);c.stroke();\n    }\n    c.globalAlpha=1;\n  });\n  c.lineCap='butt';\n\n  // \u2500\u2500 6. Solder mask overlay \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  // Semi-transparent green tint that gives PCB its characteristic look\n  var maskG=c.createLinearGradient(0,0,CW,CH);\n  maskG.addColorStop(0,'rgba(8,28,12,0.38)');\n  maskG.addColorStop(0.5,'rgba(5,18,8,0.28)');\n  maskG.addColorStop(1,'rgba(10,25,12,0.42)');\n  c.fillStyle=maskG;c.fillRect(0,0,CW,CH);\n\n  // Subtle mask thickness variation (real PCBs have slight pooling)\n  c.globalAlpha=0.04;\n  for(var i=0;i<8;i++){\n    var bx=_rng()*CW,by=_rng()*CH;\n    var grad2=c.createRadialGradient(bx,by,5,bx,by,80+_rng()*120);\n    grad2.addColorStop(0,'rgba(20,60,25,0.6)');\n    grad2.addColorStop(1,'rgba(0,0,0,0)');\n    c.fillStyle=grad2;c.fillRect(0,0,CW,CH);\n  }\n  c.globalAlpha=1;\n\n  // \u2500\u2500 7. PCB surface micro-texture (noise/grain) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  // Simulate solder mask surface roughness\n  c.globalAlpha=0.022;\n  for(var y=0;y<CH;y+=2){\n    for(var x=0;x<CW;x+=2){\n      if(_rng()>0.5){\n        c.fillStyle=_rng()>0.5?'rgba(255,255,255,1)':'rgba(0,0,0,1)';\n        c.fillRect(x,y,1,1);\n      }\n    }\n  }\n  c.globalAlpha=1;\n\n  // \u2500\u2500 8. Silkscreen layer \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  c.globalAlpha=0.55;c.strokeStyle='rgba(220,235,200,1)';\n  c.fillStyle='rgba(220,235,200,1)';\n  c.font='5px Share Tech Mono,monospace';\n  c.textBaseline='middle';c.textAlign='left';\n  SILK_ITEMS.forEach(function(item){\n    c.globalAlpha=0.14+_rng()*0.08;\n    if(item.type==='rect'){\n      c.lineWidth=0.6;c.strokeRect(item.x,item.y,item.w,item.h);\n      // Corner notch (pin 1)\n      c.lineWidth=0.5;\n      c.beginPath();c.moveTo(item.x,item.y+4);c.lineTo(item.x+4,item.y);c.stroke();\n    } else if(item.type==='circle'){\n      c.lineWidth=0.6;c.beginPath();c.arc(item.x,item.y,item.r,0,Math.PI*2);c.stroke();\n    } else if(item.type==='text'){\n      c.fillText(item.label,item.x,item.y);\n    } else if(item.type==='tri'){\n      // Pin 1 arrow triangle\n      c.beginPath();c.moveTo(item.x,item.y-3);c.lineTo(item.x+5,item.y);\n      c.lineTo(item.x,item.y+3);c.closePath();c.fill();\n    } else if(item.type==='polar'){\n      // + mark\n      c.lineWidth=0.7;\n      c.beginPath();c.moveTo(item.x-3,item.y);c.lineTo(item.x+3,item.y);c.stroke();\n      c.beginPath();c.moveTo(item.x,item.y-3);c.lineTo(item.x,item.y+3);c.stroke();\n    }\n  });\n  c.globalAlpha=1;\n\n\n  // \u2500\u2500 10. Mounting holes \u2014 ENIG plated \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  MNT_HOLES.forEach(function(m){\n    // Annular ring clearance on solder mask\n    c.beginPath();c.arc(m.x,m.y,13,0,Math.PI*2);\n    c.fillStyle='#0a1a0c';c.fill();\n    // Copper annular ring\n    c.beginPath();c.arc(m.x,m.y,11,0,Math.PI*2);\n    c.fillStyle='#9a7020';c.fill();\n    // ENIG gold ring\n    var mg=c.createRadialGradient(m.x-3.5,m.y-3.5,0,m.x,m.y,11);\n    mg.addColorStop(0,'rgba(255,242,155,0.95)');\n    mg.addColorStop(0.35,'rgba(215,170,65,0.92)');\n    mg.addColorStop(0.65,'rgba(175,128,38,0.85)');\n    mg.addColorStop(0.88,'rgba(140,95,25,0.75)');\n    mg.addColorStop(1,'rgba(90,55,10,0.5)');\n    c.beginPath();c.arc(m.x,m.y,11,0,Math.PI*2);\n    c.fillStyle=mg;c.fill();\n    c.strokeStyle='rgba(60,35,5,0.7)';c.lineWidth=0.8;c.stroke();\n    // Drill hole\n    c.beginPath();c.arc(m.x,m.y,5,0,Math.PI*2);\n    c.fillStyle='#060c07';c.fill();\n    // Inner drill ring highlight\n    var dh=c.createRadialGradient(m.x-1.5,m.y-1.5,0,m.x,m.y,5);\n    dh.addColorStop(0,'rgba(255,255,255,0.08)');dh.addColorStop(1,'rgba(0,0,0,0)');\n    c.beginPath();c.arc(m.x,m.y,5,0,Math.PI*2);\n    c.fillStyle=dh;c.fill();\n  });\n\n  // \u2500\u2500 11. Fiducial marks \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  FIDUC.forEach(function(f){\n    // Solder mask clearance\n    c.beginPath();c.arc(f.x,f.y,10,0,Math.PI*2);c.fillStyle='#091209';c.fill();\n    // Copper pad\n    c.beginPath();c.arc(f.x,f.y,6,0,Math.PI*2);c.fillStyle='#9a7828';c.fill();\n    // ENIG gold\n    var fg=c.createRadialGradient(f.x-1.8,f.y-1.8,0,f.x,f.y,6);\n    fg.addColorStop(0,'rgba(255,248,170,1)');\n    fg.addColorStop(0.4,'rgba(215,170,65,0.98)');\n    fg.addColorStop(0.8,'rgba(170,118,32,0.9)');\n    fg.addColorStop(1,'rgba(110,70,15,0.7)');\n    c.beginPath();c.arc(f.x,f.y,6,0,Math.PI*2);c.fillStyle=fg;c.fill();\n    c.strokeStyle='rgba(50,28,4,0.7)';c.lineWidth=0.6;c.stroke();\n  });\n\n  // \u2500\u2500 12. Vias \u2014 full ENIG annular rings \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  VIA_PTS.forEach(function(v){\n    var vr=v.r+1.5;\n    // Solder mask clearance (small, subtle)\n    c.beginPath();c.arc(v.x,v.y,vr+1,0,Math.PI*2);\n    c.fillStyle='rgba(5,11,6,0.45)';c.fill();\n    // Muted copper/hasl finish \u2014 not bright gold, closer to dull tin\n    c.beginPath();c.arc(v.x,v.y,vr,0,Math.PI*2);\n    c.fillStyle='rgba(110,85,45,0.55)';c.fill();\n    // Subtle sheen \u2014 very low opacity, warm grey-brown\n    var vg=c.createRadialGradient(v.x-vr*0.3,v.y-vr*0.3,0,v.x,v.y,vr);\n    vg.addColorStop(0,'rgba(175,148,95,0.5)');\n    vg.addColorStop(0.5,'rgba(130,100,55,0.35)');\n    vg.addColorStop(1,'rgba(80,58,25,0.15)');\n    c.beginPath();c.arc(v.x,v.y,vr,0,Math.PI*2);c.fillStyle=vg;c.fill();\n    c.strokeStyle='rgba(40,25,8,0.4)';c.lineWidth=0.4;c.stroke();\n    // Drill hole\n    c.beginPath();c.arc(v.x,v.y,v.r*0.5,0,Math.PI*2);\n    c.fillStyle='#050c06';c.fill();\n    // Thermal relief spokes\n    if(v.type==='thermal'){\n      c.strokeStyle='rgba(6,14,7,0.7)';c.lineWidth=1;\n      for(var a=0;a<4;a++){\n        var ang=a*Math.PI/2;\n        c.beginPath();\n        c.moveTo(v.x+Math.cos(ang)*v.r*0.55,v.y+Math.sin(ang)*v.r*0.55);\n        c.lineTo(v.x+Math.cos(ang)*(vr+0.3),v.y+Math.sin(ang)*(vr+0.3));\n        c.stroke();\n      }\n    }\n  });\n\n  // \u2500\u2500 13. Board edge \u2014 milled FR4 \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  // Router bit marks on the edge\n  c.globalAlpha=0.6;\n  c.strokeStyle='rgba(80,120,70,0.4)';c.lineWidth=1;\n  c.strokeRect(0.5,0.5,CW-1,CH-1);\n  // Inner chamfer line (routing allowance)\n  c.strokeStyle='rgba(160,200,140,0.12)';c.lineWidth=2.5;\n  c.strokeRect(3,3,CW-6,CH-6);\n  c.globalAlpha=1;\n\n  // \u2500\u2500 14. Specular highlight \u2014 studio light from top-left \u2500\u2500\n  var specG=c.createLinearGradient(0,0,CW*0.6,CH*0.5);\n  specG.addColorStop(0,'rgba(255,255,255,0.04)');\n  specG.addColorStop(0.3,'rgba(255,255,255,0.015)');\n  specG.addColorStop(1,'rgba(0,0,0,0)');\n  c.fillStyle=specG;c.fillRect(0,0,CW,CH);\n\n  // Bottom-right darkening (ambient occlusion)\n  var aoG=c.createRadialGradient(CW*0.15,CH*0.15,10,CW*0.7,CH*0.7,CW*0.85);\n  aoG.addColorStop(0,'rgba(0,0,0,0)');\n  aoG.addColorStop(0.6,'rgba(0,0,0,0.04)');\n  aoG.addColorStop(1,'rgba(0,0,0,0.18)');\n  c.fillStyle=aoG;c.fillRect(0,0,CW,CH);\n\n  return oc;\n}\n\nfunction drawBg(){\n  if(!_pcbCanvas) _pcbCanvas=buildPCBCanvas();\n  ctx.drawImage(_pcbCanvas,0,0);\n\n  // \u2500\u2500 Level label \u2014 drawn live (changes per level) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  var L=LEVELS[lvlIdx];\n  ctx.save();\n  ctx.font='bold 9px Share Tech Mono,monospace';\n  ctx.textAlign='left';ctx.textBaseline='bottom';\n  // Shadow\n  ctx.fillStyle='rgba(0,0,0,0.8)';\n  ctx.fillText(L.title+'   '+(lvlIdx+1)+'/'+LEVELS.length,9,CH-7);\n  // Text\n  ctx.fillStyle='rgba(118,185,0,0.75)';\n  ctx.fillText(L.title+'   '+(lvlIdx+1)+'/'+LEVELS.length,8,CH-8);\n  ctx.restore();\n}\n\n// Helper: drop shadow under a component\nfunction compShadow(w,h,r){\n  ctx.save();\n  ctx.shadowColor='rgba(0,0,0,0.55)';ctx.shadowBlur=6;\n  ctx.shadowOffsetX=3;ctx.shadowOffsetY=4;\n  ctx.fillStyle='rgba(0,0,0,0)';\n  ctx.beginPath();ctx.roundRect(-w/2,-h/2,w,h,r||2);ctx.fill();\n  ctx.restore();\n}\n\nfunction drawObs(o){\n  var cx=(o.col+o.w/2)*TILE,cy=(o.row+o.h/2)*TILE;\n  ctx.save();ctx.translate(cx,cy);\n\n  if(o.type==='resistor'){\n    var rw=30,rh=15;\n    // Drop shadow\n    compShadow(rw+8,rh+4,3);\n    // Body base\n    var bg=ctx.createLinearGradient(-rw/2,-rh/2,-rw/2,rh/2);\n    bg.addColorStop(0,'#ddd0a0');bg.addColorStop(0.35,'#c8b888');\n    bg.addColorStop(0.7,'#b0a070');bg.addColorStop(1,'#908050');\n    ctx.beginPath();ctx.roundRect(-rw/2,-rh/2,rw,rh,3);\n    ctx.fillStyle=bg;ctx.fill();\n    // Left bevel (lit)\n    ctx.fillStyle='rgba(255,255,220,0.22)';\n    ctx.beginPath();ctx.roundRect(-rw/2,-rh/2,4,rh,3);ctx.fill();\n    // Bottom bevel (s
